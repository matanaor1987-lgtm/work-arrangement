<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DHL — סינון דוח רובוט</title>
<script src="https://cdn.jsdelivr.net/npm/exceljs@4.3.0/dist/exceljs.min.js"></script>
<style>
  :root { --red: #D40511; --yellow: #FFCC00; --dark: #1A1A1A; --light: #F5F5F5; --border: #DDD; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: Arial, sans-serif; background: var(--light); color: var(--dark); }
  .topbar { background: var(--red); color: white; display: flex; align-items: center; gap: 14px; padding: 0 24px; height: 52px; }
  .topbar-logo { font-size: 22px; font-weight: 900; letter-spacing: 1px; }
  .topbar-title { font-size: 15px; font-weight: 600; opacity: .9; }
  .main { max-width: 860px; margin: 32px auto; padding: 0 16px 60px; }
  .upload-zone { border: 2.5px dashed var(--border); border-radius: 10px; background: white; padding: 40px 24px; text-align: center; cursor: pointer; transition: border-color .2s; position: relative; }
  .upload-zone:hover, .upload-zone.drag { border-color: var(--red); background: #FFF5F5; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%; }
  .upload-icon { font-size: 40px; margin-bottom: 10px; }
  .upload-zone h3 { font-size: 17px; margin-bottom: 6px; }
  .upload-zone p { font-size: 13px; color: #777; }
  .file-info { display: none; background: white; border: 1.5px solid var(--border); border-radius: 10px; padding: 14px 18px; align-items: center; gap: 12px; margin-top: 12px; }
  .file-info.show { display: flex; }
  .file-icon { font-size: 28px; }
  .file-details { flex: 1; }
  .file-name { font-weight: 700; font-size: 14px; }
  .file-meta { font-size: 12px; color: #777; margin-top: 2px; }
  .remove-file { background: none; border: none; font-size: 18px; cursor: pointer; color: #999; }
  .remove-file:hover { color: var(--red); }
  .legend { display: flex; gap: 10px; margin: 20px 0 10px; flex-wrap: wrap; }
  .legend-item { display: flex; align-items: center; gap: 7px; font-size: 13px; background: white; border: 1.5px solid var(--border); border-radius: 6px; padding: 6px 12px; }
  .dot { width: 14px; height: 14px; border-radius: 3px; flex-shrink: 0; }
  .dot-yellow { background: #FDD835; }
  .dot-white { background: white; border: 1px solid #CCC; }
  .run-btn { display: block; width: 100%; background: var(--red); color: white; border: none; border-radius: 8px; padding: 14px; font-size: 16px; font-weight: 700; cursor: pointer; margin-top: 18px; transition: opacity .15s; }
  .run-btn:hover:not(:disabled) { opacity: .88; }
  .run-btn:disabled { opacity: .45; cursor: not-allowed; }
  .progress-wrap { display: none; margin-top: 16px; }
  .progress-wrap.show { display: block; }
  .progress-label { font-size: 13px; color: #444; margin-bottom: 6px; }
  .progress-bar { background: var(--border); border-radius: 4px; height: 8px; overflow: hidden; }
  .progress-fill { background: var(--red); height: 100%; width: 0; transition: width .3s; }
  .results-box { display: none; margin-top: 20px; }
  .results-box.show { display: block; }
  .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 16px; }
  .stat-card { background: white; border: 1.5px solid var(--border); border-radius: 8px; padding: 14px 12px; text-align: center; }
  .stat-card .num { font-size: 26px; font-weight: 900; line-height: 1; }
  .stat-card .lbl { font-size: 12px; color: #777; margin-top: 4px; }
  .stat-card.c-yellow .num { color: #F9A825; }
  .stat-card.c-blue .num { color: #1E88E5; }
  .download-btn { display: block; width: 100%; background: var(--dark); color: var(--yellow); border: none; border-radius: 8px; padding: 13px; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity .15s; }
  .download-btn:hover { opacity: .85; }
  .error-msg { display: none; background: #FFEBEE; border: 1.5px solid #EF9A9A; border-radius: 8px; padding: 12px 16px; color: #C62828; font-size: 13px; margin-top: 12px; }
  .error-msg.show { display: block; }
</style>
</head>
<body>
<div class="topbar">
  <span class="topbar-logo">DHL</span>
  <span class="topbar-title">סינון דוח רובוט — סיווג אוטומטי</span>
</div>
<div class="main">
  <div class="upload-zone" id="uploadZone">
    <input type="file" id="fileInput" accept=".xlsx,.xls">
    <div class="upload-icon">📂</div>
    <h3>גרור את קובץ הדוח לכאן</h3>
    <p>או לחץ לבחירת קובץ — .xlsx / .xls</p>
  </div>
  <div class="file-info" id="fileInfo">
    <span class="file-icon">📊</span>
    <div class="file-details">
      <div class="file-name" id="fileName"></div>
      <div class="file-meta" id="fileMeta"></div>
    </div>
    <button class="remove-file" onclick="clearFile()">✕</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="dot dot-yellow"></div>צהוב — מזון / תוספי תזונה / ויטמינים</div>
    <div class="legend-item"><div class="dot dot-white"></div>ללא צבע — שורה רגילה</div>
  </div>
  <button class="run-btn" id="runBtn" onclick="runFilter()" disabled>הפעל סינון</button>
  <div class="progress-wrap" id="progressWrap">
    <div class="progress-label" id="progressLabel">מעבד...</div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="results-box" id="resultsBox">
    <div class="stats-grid" id="statsGrid"></div>
    <button class="download-btn" id="downloadBtn">⬇ הורד קובץ מסונן (.xlsx)</button>
  </div>
</div>
<script>
let fileBuffer = null;
let outputBlob = null;

const COMPANY_KW = ['בע"מ','בע״מ','LTD','INC','CORP','LLC','PLC','GMBH','SRL','SAS','INDUSTRIES','SOLUTIONS','SYSTEMS','TECHNOLOGIES','ENTERPRISE','TRADING','INTERNATIONAL','MANUFACTURING','FACTORY','LOGISTICS','SUPPLY'];
const MEDICAL_CO = ['MEDICAL','PHARMA','CLINIC','HOSPITAL','SURGICAL','DENTAL','BIOTECH','MEDTECH'];
const KNOWN_CO   = ['FLEX','ABB','AVNET','ARROW','SIEMENS','HONEYWELL','BOSCH','PHILIPS'];
const COSMET_CO  = ['COSMETIC','BEAUTY','SKINCARE','MAKEUP','PARFUM','PERFUME','FRAGRANCE'];
const JEWEL_CO   = ['JEWEL','DIAMOND','GOLDSMITH','SILVERSMITH','GEMSTONE'];
const FOOD_CO    = ['FOOD','CATERING','BAKERY','DAIRY','MEAT','BUTCHER'];
const CHEM_CO    = ['CHEMICAL','CHEM ','REAGENT','SOLVENT'];

const REMOVE_DESC = ['WHISKEY','WHISKY','VODKA','WINE ','BEER ','SPIRITS','COGNAC','CHAMPAGNE','BRANDY','TEQUILA','LIQUEUR','JOHNNIE WALKER','JACK DANIEL','GREY GOOSE','ABSOLUT','BACARDI','JAMESON','CHIVAS','CHÂTEAU','HENNESSY','SAKE ','RADIATOR','EXHAUST','CAR PARTS','AUTO PARTS','ROAD VEHICLE','INJECTION PARTS','SPARE PARTS CAR','BUMPER','WINDSHIELD','ENGINE PART','PHARMACEUTICAL','MEDICATION','PRESCRIPTION','MEDICAL DEVICE','SURGICAL INSTRUMENT','STETHOSCOPE','SCALPEL','SYRINGE','FRESH FRUIT','FRESH VEGETABLE','LIVE PLANT','FRESH MEAT','FRESH FISH','ENGINE OIL','MOTOR OIL','LUBRICANT OIL','HYDRAULIC OIL','TACTICAL KNIFE','COMBAT KNIFE','HUNTING KNIFE','CIGARETTE','TOBACCO','VAPE','CIGAR','HOOKAH','SHISHA','COMMERCIAL SAMPLE','SAMPLE ONLY','NO COMMERCIAL VALUE','CAR LIFT','VEHICLE LIFT','TIRE CHANGER','WHEEL BALANCER','INFLATABLE','CARRIAGE','LAPHROAIG','SHERRY','MALT'];

const YELLOW_DESC = ['FOOD','SNACK','CANDY','CHOCOLATE','COFFEE','TEA ','BISCUIT','COOKIE','SAUCE','SPICE','SEASONING','NUT ','NUTS','DRIED FRUIT','CEREAL','PROTEIN BAR','ENERGY BAR','GRANOLA','OATMEAL','PASTA','NOODLE','SUPPLEMENT','VITAMIN','MINERAL','PROBIOTIC','OMEGA','COLLAGEN','WHEY','CREATINE','BCAA','PRE-WORKOUT','NUTRITIONAL','DIETARY','HERBAL','HERB ','EXTRACT ','CAPSULE','TABLET','POWDER','FISH OIL','COD LIVER','MAGNESIUM','CALCIUM','ZINC','IRON ','OPTIMUM NUTRITION','LACTOFIT','DOTERRA','RED BULL','MONSTER ENERGY','MYPROTEIN','HERBALIFE'];

function isCompany(n) { const u=String(n||'').toUpperCase(); for(const l of [COMPANY_KW,MEDICAL_CO,KNOWN_CO,COSMET_CO,JEWEL_CO,FOOD_CO,CHEM_CO]) for(const k of l) if(u.includes(k)) return true; return false; }
function shouldRemove(d) { const u=String(d||'').toUpperCase(); for(const k of REMOVE_DESC) if(u.includes(k)) return true; return false; }
function shouldYellow(d,s) { const u=String(d||'').toUpperCase(),v=String(s||'').toUpperCase(); for(const k of YELLOW_DESC) if(u.includes(k)||v.includes(k)) return true; return false; }

const fileInput=document.getElementById('fileInput'), uploadZone=document.getElementById('uploadZone');
fileInput.addEventListener('change',e=>handleFile(e.target.files[0]));
uploadZone.addEventListener('dragover',e=>{e.preventDefault();uploadZone.classList.add('drag');});
uploadZone.addEventListener('dragleave',()=>uploadZone.classList.remove('drag'));
uploadZone.addEventListener('drop',e=>{e.preventDefault();uploadZone.classList.remove('drag');handleFile(e.dataTransfer.files[0]);});

function handleFile(file) {
  if(!file) return;
  document.getElementById('fileName').textContent=file.name;
  document.getElementById('fileMeta').textContent=(file.size/1024).toFixed(0)+' KB';
  document.getElementById('fileInfo').classList.add('show');
  document.getElementById('runBtn').disabled=false;
  const r=new FileReader(); r.onload=e=>{fileBuffer=e.target.result;}; r.readAsArrayBuffer(file);
}

function clearFile() {
  fileBuffer=outputBlob=null; fileInput.value='';
  ['fileInfo','resultsBox','progressWrap','errorMsg'].forEach(id=>document.getElementById(id).classList.remove('show'));
  document.getElementById('runBtn').disabled=true;
}

function setProgress(p,l){document.getElementById('progressFill').style.width=p+'%';document.getElementById('progressLabel').textContent=l;}
function showError(m){const e=document.getElementById('errorMsg');e.textContent=m;e.classList.add('show');}

async function runFilter() {
  if(!fileBuffer) return;
  document.getElementById('errorMsg').classList.remove('show');
  document.getElementById('resultsBox').classList.remove('show');
  document.getElementById('progressWrap').classList.add('show');
  document.getElementById('runBtn').disabled=true;

  try {
    setProgress(10,'קורא קובץ...');
    await new Promise(r=>setTimeout(r,30));

    const wb = new ExcelJS.Workbook();
    await wb.xlsx.load(fileBuffer);
    const ws = wb.worksheets[0];

    setProgress(20,'מאתר כותרות...');
    await new Promise(r=>setTimeout(r,20));

    let headerRowNum=-1, headers=[];
    ws.eachRow((row,rn)=>{
      if(headerRowNum!==-1) return;
      const vals=row.values.map(v=>String(v||''));
      if(vals.includes('IMPORTER_NO')||vals.includes('STEP_1615')){headerRowNum=rn;headers=vals;}
    });

    if(headerRowNum===-1){showError('לא נמצאה שורת כותרות.');document.getElementById('progressWrap').classList.remove('show');document.getElementById('runBtn').disabled=false;return;}

    const ci=name=>{
      let i=headers.indexOf(name);
      if(i===-1) i=headers.indexOf(String(name));
      return i;
    };

    setProgress(30,'מסנן שורות...');
    await new Promise(r=>setTimeout(r,20));

    const outWb=new ExcelJS.Workbook();
    const outWs=outWb.addWorksheet('דוח מסונן');
    const newHeaders=[...headers.slice(1)];
    outWs.addRow(newHeaders);

    const headerRow=outWs.getRow(1);
    headerRow.eachCell(cell=>{
      cell.fill={type:'pattern',pattern:'solid',fgColor:{argb:'FF1A1A1A'}};
      cell.font={name:'Arial',bold:true,color:{argb:'FFFFFFFF'},size:10};
      cell.alignment={horizontal:'center',vertical:'middle'};
    });
    headerRow.height=18;

    const FILL_YELLOW={type:'pattern',pattern:'solid',fgColor:{argb:'FFFFF9C4'}};
    const FONT_NORMAL={name:'Arial',size:10};
    const ALIGN_RIGHT={horizontal:'right',vertical:'middle'};

    let removed=0,yellowC=0,normalC=0;
    const totalRows=ws.rowCount-headerRowNum;

    ws.eachRow((row,rn)=>{
      if(rn<=headerRowNum) return;

      const get=name=>{const idx=ci(name);return idx>0?row.getCell(idx).value:'';};

      const weight=parseFloat(get('WEIGHT'))||0;
      const step=String(get('STEP_1615')||'').trim().toLowerCase();
      const country=String(get('COUNTRY_OF_ORIGIN')||'').trim().toUpperCase();
      const wg=String(get('WG_PRAT_MECHES')||'').trim();
      const impName=String(get('IMPORTER_NAME')||'');
      const teur=String(get('TEUR_TOVIN')||'');
      const shipper=String(get('SHIPPER')||'');

      // עמודה 151
      const idx151=headers.indexOf('151')>0?headers.indexOf('151'):headers.findIndex(h=>String(h)==='151');
      const col151=idx151>0?String(row.getCell(idx151).value||'').trim():'';

      if(weight>=30){removed++;return;}
      if(step!=='yes'){removed++;return;}
      if(country==='IL'){removed++;return;}

      if(col151!==''&&col151!==' '){removed++;return;}
      if(isCompany(impName)){removed++;return;}
      if(shouldRemove(teur)){removed++;return;}

      const yellow=shouldYellow(teur,shipper);
      if(yellow)yellowC++;else normalC++;

      const rowVals=headers.slice(1).map((_,i)=>row.getCell(i+1).value);
      const newRow=outWs.addRow(rowVals);
      newRow.eachCell(cell=>{
        if(yellow) cell.fill=FILL_YELLOW;
        cell.font=FONT_NORMAL;
        cell.alignment=ALIGN_RIGHT;
      });
      newRow.height=16;
    });

    setProgress(85,'מגדיר עמודות...');
    await new Promise(r=>setTimeout(r,20));

    newHeaders.forEach((h,i)=>{
      const col=outWs.getColumn(i+1);
      const hs=String(h||'');
      if(hs.includes('TEUR')) col.width=35;
      else if(hs.includes('IMPORTER_NAME')) col.width=22;
      else if(hs.includes('SHIPPER')) col.width=25;
      else col.width=14;
    });
    outWs.views=[{state:'frozen',ySplit:1}];

    setProgress(95,'שומר...');
    await new Promise(r=>setTimeout(r,20));

    const buf=await outWb.xlsx.writeBuffer();
    outputBlob=new Blob([buf],{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});

    setProgress(100,'הסינון הושלם ✓');
    document.getElementById('statsGrid').innerHTML=`
      <div class="stat-card c-blue"><div class="num">${yellowC+normalC}</div><div class="lbl">שורות אחרי סינון</div></div>
      <div class="stat-card"><div class="num">${removed}</div><div class="lbl">שורות הוסרו</div></div>
      <div class="stat-card c-yellow"><div class="num">${yellowC}</div><div class="lbl">🟡 מזון / תוספים</div></div>
      <div class="stat-card"><div class="num">${normalC}</div><div class="lbl">ללא סימון</div></div>`;
    document.getElementById('resultsBox').classList.add('show');
    document.getElementById('runBtn').disabled=false;
    document.getElementById('downloadBtn').onclick=()=>{
      const a=document.createElement('a');
      a.href=URL.createObjectURL(outputBlob);
      a.download='דוח_רובוט_מסונן.xlsx';
      a.click();
    };

  } catch(err){
    showError('שגיאה: '+err.message);
    document.getElementById('progressWrap').classList.remove('show');
    document.getElementById('runBtn').disabled=false;
  }
}
</script>
</body>
</html>
