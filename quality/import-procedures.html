const keepIds = new Set(records.map(r=>r.id));
const names = new Set(records.map(r=>r.name));

async function run(){
  const st=document.getElementById('status');
  st.innerHTML='';
  try{
    const r = await fetch(DB+'/nahalim.json?t='+Date.now());
    const all = (await r.json()) || {};
    const dupes = Object.keys(all).filter(id => !keepIds.has(id) && names.has((all[id]||{}).name));
    if(dupes.length){
      st.innerHTML += '<div class="info">ОъОаОДОћ '+dupes.length+' ОеОЕОЋОъОЋОф ОЏОцОЋОюОЋОф ОъОаОЎОАОЎОЋОЪ ОДОЋОЊОЮ...</div>';
      for(const id of dupes){
        await fetch(DB+'/nahalim/'+id+'.json',{method:'DELETE'});
      }
    }
  }catch(e){
    st.innerHTML += '<div class="err">ОЕОњОЎОљОћ ОЉОЉОЊОЎОДОф ОЏОцОЎОюОЋОЎОЋОф (ОъОъОЕОЎОџ ОЉОЏОю ОќОљОф)</div>';
  }

  for(const rec of records){
    const {id, ...data} = rec;
    try{
      await fetch(DB+'/nahalim/'+id+'.json',{method:'PUT',body:JSON.stringify(data)});
      st.innerHTML += '<div class="ok">Рюћ '+data.name+'</div>';
    }catch(e){
      st.innerHTML += '<div class="err">Рюў '+data.name+' Рђћ ОЕОњОЎОљОћ</div>';
    }
  }
  document.getElementById('doneArea').innerHTML = '<a class="btn" href="index.html">ОъОбОЉОе ОюОъОбОеОЏОф</a>';
}
run();
