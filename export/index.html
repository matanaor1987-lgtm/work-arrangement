function getWeekDays(offset=0){
  const mon=getMondayOfWeek(offset);
  return Array.from({length:6},(_,i)=>{const d=new Date(mon);d.setDate(mon.getDate()+i);return d;});
}
function weekKey(offset=0){
  const mon=getMondayOfWeek(offset);
  return `w${mon.getFullYear()}${String(mon.getMonth()+1).padStart(2,'0')}${String(mon.getDate()).padStart(2,'0')}`;
}
function fmtDate(d){return `${String(d.getDate()).padStart(2,'0')}.${String(d.getMonth()+1).padStart(2,'0')}`;}
function isToday(d){const t=new Date();return d.getDate()===t.getDate()&&d.getMonth()===t.getMonth()&&d.getFullYear()===t.getFullYear();}
function isTodayInWeek(offset=0){return getWeekDays(offset).some(d=>isToday(d));}

// ===== FIREBASE INIT =====
function initFirebase(cfg){
  try{
    app=initializeApp(cfg);
    auth=getAuth(app);
    db=getDatabase(app);
    state.configured=true;
    onAuthStateChanged(auth,user=>{
      state.user=user;
      listenToData();
      render();
    });
  }catch(e){alert('שגיאה בחיבור Firebase');state.configured=false;render();}
}

function listenToData(){
  if(!db)return;
  onValue(ref(db,'employees'),snap=>{
    const d=snap.val();
    employees=Array.isArray(d)&&d.length>0?d:[];
    render();
  });
  onValue(ref(db,'tasks'),snap=>{
    const d=snap.val();
    taskPresets=Array.isArray(d)&&d.length>0?d:[...DEFAULT_TASKS];
    render();
  });
  onValue(ref(db,'numRows'),snap=>{if(snap.val())state.numRows=snap.val();render();});
  onValue(ref(db,'teamMsg'),snap=>{state.teamMsg=snap.val()||'';render();});
  onValue(ref(db,'scheduleData'),snap=>{state.scheduleData=snap.val()||{};render();});
  listenToRequests();
}

function saveCell(wk,row,day,data){set(ref(db,`scheduleData/${wk}/${row}/${day}`),data);}
function clearCellDB(wk,row,day){remove(ref(db,`scheduleData/${wk}/${row}/${day}`));}
function saveEmployees(){set(ref(db,'employees'),employees);showToast('✓ עובדים נשמרו');}
function saveTasks(){set(ref(db,'tasks'),taskPresets);}
function saveNumRows(){set(ref(db,'numRows'),state.numRows);}

// ===== TOAST =====
function showToast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ===== TABLE ROWS =====
function buildTableRows(days, wk, isAdmin){
  const wkData=state.scheduleData[wk]||{};
  let rows='';
  for(let row=0;row<state.numRows;row++){
    const rowData=wkData[row]||{};
    rows+=`<tr>
      <td class="row-col">${row+1}</td>
      ${days.map((_,day)=>{
        const cell=rowData[day];
        const todayCls=isToday(days[day])?' today-col':'';
        if(!cell||(!cell.task&&!cell.rep)){
          return `<td class="${todayCls}"><div class="cell-empty"${isAdmin?` onclick="openPopup(${row},${day})"`:''}>+</div></td>`;
        }
        if(cell.type==='vacation'){
          return `<td class="${todayCls}"><div class="cell-vacation"${isAdmin?` onclick="openPopup(${row},${day})"`:''}>
            <div><div class="cell-rep">${cell.rep||''}</div><div class="cell-vacation-label">🌴 חופש</div></div></div></td>`;
        }
        if(cell.type==='off'){
          return `<td class="${todayCls}"><div class="cell-off"${isAdmin?` onclick="openPopup(${row},${day})"`:''}>
            <div><div class="cell-rep">${cell.rep||''}</div><div class="cell-off-label">🏠 WFH</div></div></div></td>`;
        }
        return `<td class="${todayCls}"><div class="cell-wrap"${isAdmin?` onclick="openPopup(${row},${day})"`:''}>
          ${cell.task?`<div class="cell-task">${cell.task}</div>`:''}
          ${cell.rep?`<div class="cell-rep">${cell.rep}</div>`:''}
          ${cell.hour?`<div class="cell-hour">⏰ ${cell.hour}:00</div>`:''}
        </div></td>`;
      }).join('')}
    </tr>`;
  }
  return rows;
}

window.pickTask=function(t){const el=document.getElementById('pop-task');if(el)el.value=t;};

window.doSaveCell=function(){
  if(!state.popup)return;
  const{row,day,weekKey:wk}=state.popup;
  const data={
    task:document.getElementById('pop-task').value.trim(),
    rep:document.getElementById('pop-rep').value.trim(),
    hour:document.getElementById('pop-hour').value,
    type:document.getElementById('pop-type').value
  };
  saveCell(wk,row,day,data);
  // WhatsApp
  const phone=getEmpPhone(data.rep);
  if(state.waNotif&&phone&&data.rep){
    if(confirm(`לשלוח הודעת WhatsApp ל${data.rep} על השיבוץ?`)){
      const days=getWeekDays(state.weekOffset);
      const dayName=DAY_NAMES_FULL[days[day].getDay()];
      const msg=`היי ${data.rep} 👋\nשובצת ל: ${data.task||''} ביום ${dayName} ${fmtDate(days[day])}${data.hour?' בשעה '+data.hour+':00':''}.\nבברכה, מכס יצוא 📋`;
      sendWhatsApp(phone,msg);
    }
  }
  state.popup=null;showToast('✓ נשמר');render();
};

window.doClearCell=function(){
  if(!state.popup)return;
  const{row,day,weekKey:wk}=state.popup;
  clearCellDB(wk,row,day);
  state.popup=null;showToast('🗑 נמחק');render();
};

    const ii=document.getElementById('emp-i-'+i);

          ${allEmployees.map(e=>{
            const today=new Date();
            const bd=e.birthday||'';
            const isBday=bd&&bd.split('/')[0]===String(today.getDate()).padStart(2,'0')&&bd.split('/')[1]===String(today.getMonth()+1).padStart(2,'0');
            return `<button onclick="selectEmpWithId('${e.name.replace(/'/g,"\\'")}')"
              style="padding:10px;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;background:#fafbff;text-align:right">
              <span style="font-weight:700">${e.name}${isBday?' 🎂':''}</span>
            </button>`;
          }).join('')}
        </div>
      </div>
    </div>`;
  }

  // Show employee's week
  const days=getWeekDays(state.weekOffset);
  const wk=weekKey(state.weekOffset);
  const wkData=state.scheduleData[wk]||{};
  const empName=state.personalEmp;
  const mon=getMondayOfWeek(state.weekOffset);
  const sun=new Date(mon);sun.setDate(mon.getDate()+5);

  // Find this emp's shifts this week
  function findEmpCell(day){
    for(const row of Object.values(wkData)){
      const cell=row[day];
      if(cell&&cell.rep===empName)return cell;
    }
    return null;
  }

  // Count stats
  let workDays=0,vacDays=0;
  for(let d=0;d<6;d++){const c=findEmpCell(d);if(c&&c.type!=='vacation')workDays++;if(c&&c.type==='vacation')vacDays++;}

  return `<div class="emp-view-screen">
    <div class="emp-view-topbar">
      <h2>שלום, ${empName} 👋</h2>
      <button onclick="closeEmpView()" style="background:rgba(255,255,255,0.2);border:none;color:#fff;padding:5px 12px;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700">✕ יציאה</button>
    </div>
    <div class="dhl-yellow-stripe"></div>
    ${state.teamMsg?`<div style="background:var(--dhl-red);color:#fff;padding:10px 16px;font-size:13px;font-weight:600">📢 ${state.teamMsg}</div>`:''}

    <!-- week nav -->
    <div style="display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid #e0e0e0">
      <button onclick="shiftWeekEmp(-1)" style="border:1.5px solid #e0e0e0;background:#fff;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:14px;color:var(--dhl-red);font-weight:800">&#8592;</button>
      <div style="flex:1;text-align:center;font-size:14px;font-weight:800">${fmtDate(mon)} — ${fmtDate(sun)} · ${mon.getFullYear()}</div>
      <button onclick="shiftWeekEmp(1)" style="border:1.5px solid #e0e0e0;background:#fff;border-radius:4px;padding:4px 12px;cursor:pointer;font-size:14px;color:var(--dhl-red);font-weight:800">&#8594;</button>
    </div>

    <!-- stats -->
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:12px 16px">
      <div style="background:#fff;border-radius:6px;padding:12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.07);border-top:3px solid var(--dhl-red)">
        <div style="font-size:24px;font-weight:900;color:var(--dhl-red)">${workDays}</div>
        <div style="font-size:11px;color:#888;font-weight:600">ימי עבודה</div>
      </div>
      <div style="background:#fff;border-radius:6px;padding:12px;text-align:center;box-shadow:0 1px 6px rgba(0,0,0,0.07);border-top:3px solid #2e7d32">
        <div style="font-size:24px;font-weight:900;color:#2e7d32">${vacDays}</div>
        <div style="font-size:11px;color:#888;font-weight:600">ימי חופש</div>
      </div>
    </div>

    <!-- shifts -->
    <div style="background:#fff;margin:0 12px;border-radius:6px;border:1px solid #e0e0e0;overflow:hidden;margin-bottom:12px">
      ${days.map((d,dayIdx)=>{
        const cell=findEmpCell(dayIdx);
        const tod=isToday(d);
        const bg=tod?'#fffde7':'#fff';
        const border=tod?'border-right:4px solid var(--dhl-yellow)':'border-right:4px solid #e0e0e0';
        let content='<div style="color:#ccc;font-size:13px">—</div>';
        if(cell){
          if(cell.type==='vacation')content=`<div style="background:#e8f5e9;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:700;color:#2e7d32">🌴 חופש</div>`;
          else if(cell.type==='off')content=`<div style="background:#f3e5f5;padding:4px 10px;border-radius:4px;font-size:12px;font-weight:700;color:#7b1fa2">🏠 WFH</div>`;
          else content=`<div style="display:flex;flex-direction:column;gap:2px">
            ${cell.task?`<div style="font-size:13px;font-weight:700">${cell.task}</div>`:''}
            ${cell.hour?`<div style="font-size:11px;color:#888">⏰ ${cell.hour}:00</div>`:''}
          </div>`;
        }
        return `<div style="display:flex;align-items:center;padding:12px 16px;border-bottom:1px solid #f0f0f0;background:${bg};${border}">
          <div style="min-width:80px">
            <div style="font-size:13px;font-weight:800;color:${tod?'var(--dhl-red)':'var(--dhl-dark)'}">${DAY_NAMES_FULL[d.getDay()]}</div>
            <div style="font-size:11px;color:#888">${fmtDate(d)}${tod?' ← היום':''}</div>
          </div>
          <div style="flex:1;padding:0 12px">${content}</div>
        </div>`;
      }).join('')}
    </div>

    <div style="margin:0 12px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px">
      <button onclick="openEmpReqFromView()" style="padding:14px;background:#fff;border:2px solid var(--dhl-red);border-radius:6px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:800;color:var(--dhl-red)">📋 הגש בקשה</button>
    </div>
  </div>

  ${buildReqOverlay()}
  `;
}

window.shiftWeekEmp=function(d){state.weekOffset+=d;render();};
window.openEmpReqFromView=function(){
  reqState={show:true,mode:'emp-form',viewEmp:state.personalEmp,viewRole:''};render();
};
window.openEmpReqBtn=function(){
  if(!state.personalEmp){state.empView=true;state._afterLoginGoToRequests=true;render();return;}
  reqState={show:true,mode:'emp-form',viewEmp:state.personalEmp,viewRole:''};render();
};

// ===== REQUEST SYSTEM =====
function getPendingCount(){return(window._allRequests||[]).filter(r=>r.status==='pending').length;}
function listenToRequests(){
  if(!db)return;
  onValue(ref(db,'requests'),snap=>{
    const d=snap.val()||{};
    window._allRequests=Object.entries(d).map(([id,v])=>({id,...v}));
    render();
  });
}

window.openAdminRequests=function(){reqState={show:true,mode:'admin'};render();};
window.closeReqModal=function(){reqState={show:false,mode:''};render();};
window.cancelRequest=function(id){if(!confirm('לבטל?'))return;remove(ref(db,'requests/'+id));showToast('✓ בוטלה');};
window._onReqTypeChange=function(){
  const t=document.getElementById('req-type').value;
  const isRange=t==='חופשה רציפה';
  document.getElementById('req-date-single').style.display=isRange?'none':'block';
  document.getElementById('req-date-range').style.display=isRange?'block':'none';
};
window.submitRequest=function(empName,role){
  const type=document.getElementById('req-type').value;
  const isRange=type==='חופשה רציפה';
  let date='',dateTo='';
  if(isRange){
    date=document.getElementById('req-date-from').value;
    dateTo=document.getElementById('req-date-to').value;
    if(!date||!dateTo){alert('בחר תאריכים');return;}
    if(date>dateTo){alert('תאריך התחלה חייב להיות לפני סיום');return;}
  } else {
    date=document.getElementById('req-date').value;
    if(!date){alert('בחר תאריך');return;}
  }
  const desc=document.getElementById('req-desc').value;
  const id='req_'+Date.now();
  set(ref(db,'requests/'+id),{empName,role,type,date,dateTo:dateTo||'',desc,status:'pending',ts:Date.now(),seen:false});
  showToast('✓ הבקשה נשלחה!');closeReqModal();
};
window.handleRequest=function(id,status){
  const noteEl=document.getElementById('note-'+id);
  const adminNote=noteEl?noteEl.value:'';
  set(ref(db,'requests/'+id+'/status'),status);
  set(ref(db,'requests/'+id+'/adminNote'),adminNote);
  set(ref(db,'requests/'+id+'/seen'),false);
  const req=(window._allRequests||[]).find(r=>r.id===id);
  showToast(status==='approved'?'✅ אושר':'❌ נדחה');
  if(state.waNotif&&req){
    const phone=getEmpPhone(req.empName);
    if(phone&&confirm(`לשלוח WA ל${req.empName}?`)){
      const msg=status==='approved'
        ?`היי ${req.empName} 👋\nבקשתך "${req.type}"${req.date?' ל-'+req.date:''} ✅ אושרה!\nבברכה, מכס יצוא 📋`
        :`היי ${req.empName} 👋\nבקשתך "${req.type}"${req.date?' ל-'+req.date:''} ❌ נדחתה.\nבברכה, מכס יצוא 📋`;
      sendWhatsApp(phone,msg);
    }
  }
  render();
};

function buildReqOverlay(){
  if(!reqState.show)return'';
  if(reqState.mode==='emp-select')return buildEmpSelectForReq();
  if(reqState.mode==='emp-form')return buildEmpReqForm(reqState.viewEmp);
  if(reqState.mode==='admin')return buildAdminReqPanel();
  return'';
}

function buildEmpSelectForReq(){
  return `<div class="req-modal" onclick="if(event.target===this)closeReqModal()">
    <div class="req-box">
      <h2>📋 בקשות ואילוצים</h2>
      <p style="font-size:13px;color:#555;margin-bottom:14px">בחר שם והכנס מספר עובד:</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:16px">
        ${employees.map(e=>`<button onclick="selectEmpForReq('${e.name.replace(/'/g,"\\'")}','${e.role||''}')"
          style="padding:10px;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;font-size:13px;font-family:inherit;background:#fafbff;text-align:right">
          <span style="font-weight:700">${e.name}</span>
        </button>`).join('')}
      </div>
      <button onclick="closeReqModal()" style="width:100%;padding:8px;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px">סגור</button>
    </div>
  </div>`;
}

window.selectEmpForReq=function(name,role){
  const emp=employees.find(e=>e.name===name);
  if(!emp||!emp.empId){reqState={...reqState,mode:'emp-form',viewEmp:name,viewRole:role||''};render();return;}
  const input=prompt(`שלום ${name} 👋\nהכנס מספר עובד:`);
  if(input===null)return;
  if(input.trim()===emp.empId){reqState={...reqState,mode:'emp-form',viewEmp:name,viewRole:role||''};render();}
  else{alert('❌ מספר עובד שגוי');}
};

function buildEmpReqForm(empName){
  const myReqs=(window._allRequests||[]).filter(r=>r.empName===empName);
  const REQ_TYPES=['חופש','חופשה רציפה','יציאה מוקדמת','איחור','שינוי שיבוץ','אחר'];
  return `<div class="req-modal" onclick="if(event.target===this)closeReqModal()">
    <div class="req-box">
      <h2>📋 ${empName} — בקשות</h2>
      <div style="background:#FFF9E6;border-radius:10px;padding:14px;margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:10px;color:var(--dhl-red)">הגש בקשה חדשה</div>
        <div class="req-form">
          <label>סוג בקשה</label>
          <select id="req-type" onchange="_onReqTypeChange()">${REQ_TYPES.map(t=>`<option>${t}</option>`).join('')}</select>
          <div id="req-date-single">
            <label>תאריך</label><input type="date" id="req-date">
          </div>
          <div id="req-date-range" style="display:none">
            <label>מתאריך</label><input type="date" id="req-date-from">
            <label>עד תאריך</label><input type="date" id="req-date-to">
          </div>
          <label>פירוט</label>
          <textarea id="req-desc" placeholder="תאר את הבקשה..."></textarea>
        </div>
        <button onclick="submitRequest('${empName.replace(/'/g,"\\'")}','')" style="width:100%;margin-top:10px;padding:9px;background:var(--dhl-red);color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;font-weight:700">📤 שלח בקשה</button>
      </div>
      ${myReqs.length>0?`
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">הבקשות שלי</div>
        ${myReqs.sort((a,b)=>b.ts-a.ts).map(r=>`
          <div class="emp-req-card">
            <div style="display:flex;justify-content:space-between;align-items:center">
              <span class="req-type">${r.type}</span>
              <span class="status-${r.status}">${r.status==='pending'?'⏳ ממתין':r.status==='approved'?'✅ אושר':'❌ נדחה'}</span>
            </div>
            <div style="font-size:12px;color:#555">${r.date||''}${r.dateTo?' — עד '+r.dateTo:''} ${r.desc?'— '+r.desc:''}</div>
            ${r.adminNote?`<div style="font-size:12px;margin-top:4px;padding:4px 8px;background:#FFF9E6;border-radius:6px">💬 ${r.adminNote}</div>`:''}
            ${r.status==='pending'?`<div style="margin-top:8px"><button onclick="cancelRequest('${r.id}')" style="padding:4px 12px;font-size:11px;background:#fff0f0;color:#c00;border:1px solid #ffb0b0;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700">✕ בטל</button></div>`:''}
          </div>
        `).join('')}
      `:''}
      <button onclick="closeReqModal()" style="width:100%;padding:8px;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;margin-top:8px">סגור</button>
    </div>
  </div>`;
}

function buildAdminReqPanel(){
  const allReqs=(window._allRequests||[]).sort((a,b)=>b.ts-a.ts);
  const pending=allReqs.filter(r=>r.status==='pending');
  const handled=allReqs.filter(r=>r.status!=='pending');
  return `<div class="req-modal" onclick="if(event.target===this)closeReqModal()">
    <div class="req-box">
      <h2>🔔 ניהול בקשות (${pending.length} ממתינות)</h2>
      ${pending.length===0?`<div style="text-align:center;color:#888;padding:20px">אין בקשות ממתינות ✓</div>`:''}
      ${pending.map(r=>`
        <div class="req-card">
          <div class="req-meta">${new Date(r.ts).toLocaleDateString('he-IL')}</div>
          <div class="req-name">${r.empName}</div>
          <div style="display:flex;align-items:center;gap:8px;flex-wrap:wrap;margin:4px 0">
            <span class="req-type">${r.type}</span>
            ${r.date?`<span style="font-size:12px;font-weight:700">📅 ${r.date}${r.dateTo?' → '+r.dateTo:''}</span>`:''}
          </div>
          ${r.desc?`<div class="req-note">${r.desc}</div>`:''}
          <input class="admin-note-inp" id="note-${r.id}" placeholder="הוסף הערה (אופציונלי)...">
          <div class="req-actions">
            <button class="btn-approve" onclick="handleRequest('${r.id}','approved')">✅ אשר</button>
            <button class="btn-reject" onclick="handleRequest('${r.id}','rejected')">❌ דחה</button>
          </div>
        </div>
      `).join('')}
      ${handled.length>0?`
        <div style="font-size:12px;font-weight:600;color:#888;margin:12px 0 8px;border-top:1px solid #eee;padding-top:12px">טופלו</div>
        ${handled.slice(0,5).map(r=>`
          <div class="req-card" style="opacity:0.7">
            <div class="req-name">${r.empName} — <span class="req-type">${r.type}</span>
              <span class="status-${r.status}" style="margin-right:8px">${r.status==='approved'?'✅ אושר':'❌ נדחה'}</span>
            </div>
            ${r.date?`<div style="font-size:11px;color:#888">📅 ${r.date}${r.dateTo?' עד '+r.dateTo:''}</div>`:''}
            ${r.adminNote?`<div style="font-size:11px;color:#555">💬 ${r.adminNote}</div>`:''}
          </div>
        `).join('')}
      `:''}
      <button onclick="closeReqModal()" style="width:100%;padding:8px;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px;margin-top:8px">סגור</button>
    </div>
  </div>`;
}

function buildPersonalModal(){return'';}// included in emp view

// ===== WHATSAPP =====
function getEmpPhone(name){const e=employees.find(e=>e.name===name);return e&&e.phone?e.phone.replace(/\D/g,''):'';}
function sendWhatsApp(phone,msg){
  if(!phone){showToast('⚠️ אין מספר טלפון');return;}
  let intl=phone;if(intl.startsWith('0'))intl='972'+intl.slice(1);
  window.open('https://wa.me/'+intl+'?text='+encodeURIComponent(msg),'_blank');
}
window.toggleWaNotif=function(){state.waNotif=!state.waNotif;showToast(state.waNotif?'📱 WA פעיל':'📱 WA כבוי');render();};

// ===== BACKUP / RESTORE =====
window.exportBackupJSON=async function(){
  if(!db){showToast('⚠️ אין חיבור');return;}
  showToast('⏳ מייצא...');
  try{
    const snap=await get(ref(db,'/'));
    const allData=snap.val()||{};
    const now=new Date();
    const fname=`export-schedule-backup-${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}.json`;
    const blob=new Blob([JSON.stringify({_meta:{exportedAt:now.toISOString()},...allData},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download=fname;a.click();
    URL.revokeObjectURL(a.href);
    localStorage.setItem('export_last_backup',Date.now().toString());
    showToast('✅ גיבוי נשמר: '+fname);
  }catch(e){showToast('❌ שגיאה: '+e.message);}
};
window.importBackupJSON=async function(event){
  const file=event.target.files[0];if(!file)return;
  if(!confirm(`שחזור מ-"${file.name}"?\nכל הנתונים ידרסו!`)){event.target.value='';return;}
  showToast('⏳ משחזר...');
  try{
    const data=JSON.parse(await file.text());
    delete data._meta;
    for(const[key,val]of Object.entries(data)){await set(ref(db,key),val);}
    showToast('✅ שוחזר בהצלחה!');
    setTimeout(()=>listenToData(),1000);
  }catch(e){showToast('❌ קובץ לא תקין');}
  event.target.value='';
};

// Backup reminder
(function(){
  const last=parseInt(localStorage.getItem('export_last_backup')||'0');
  const hoursSince=(Date.now()-last)/3600000;
  if(hoursSince>24)setTimeout(()=>{if(state.mode==='admin')showToast('💡 לא גיבית מזה '+Math.floor(hoursSince)+' שעות');},4000);
})();

// ===== PWA =====
let deferredPrompt=null;
window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault();deferredPrompt=e;
  const btn=document.getElementById('pwa-install-btn');if(btn)btn.style.display='flex';
});
window.installPWA=function(){
  if(deferredPrompt){deferredPrompt.prompt();deferredPrompt.userChoice.then(()=>{deferredPrompt=null;});}
};

function buildSetup(){return `<div style="max-width:400px;margin:60px auto;padding:20px;text-align:center"><div style="font-size:40px;margin-bottom:16px">⚙️</div><div style="font-size:16px;color:#888">טוען הגדרות Firebase...</div></div>`;}

// ===== INIT =====
initFirebase(BUILTIN_CONFIG);

// Auto-seed employees if Firebase is empty
async function seedEmployeesIfEmpty(){
  if(!db)return;
  const snap=await get(ref(db,'employees'));
  if(!snap.val()||!Array.isArray(snap.val())||snap.val().length===0){
    await set(ref(db,'employees'),EMPLOYEES_DEFAULT);
  }
}
setTimeout(seedEmployeesIfEmpty,2000);
