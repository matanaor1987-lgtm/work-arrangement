<title>סידור עבודה DHL</title>
<meta name="theme-color" content="#D40511">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="DHL סידור">
<link rel="manifest" href="data:application/json;base64,eyJuYW1lIjoiU2lkdXIgQXZvZGEgREhMIiwic2hvcnRfbmFtZSI6IkRITCDXqdeT🥇ZFIiwiZGVzY3JpcHRpb24iOiLXqdeT🥇ZFIHNjaGVkdWxlIiwic3RhcnRfdXJsIjoiLiIsImRpc3BsYXkiOiJzdGFuZGFsb25lIiwiYmFja2dyb3VuZF9jb2xvciI6IiNENDA1MTEiLCJ0aGVtZV9jb2xvciI6IiNENDA1MTEifQ==">
<script>
// Generate DHL icon as canvas and set as apple-touch-icon
window.addEventListener('load',function(){
  try{
    const c=document.createElement('canvas');
    c.width=192;c.height=192;
    const ctx=c.getContext('2d');
    // Red background
    ctx.fillStyle='#D40511';
    ctx.fillRect(0,0,192,192);
    // Yellow rounded rect for logo bg
    ctx.fillStyle='#FFCC00';
    ctx.beginPath();
    ctx.roundRect(16,40,160,80,12);
    ctx.fill();
    // DHL text
    ctx.fillStyle='#D40511';
    ctx.font='bold 62px Arial Black,Arial';
    ctx.textAlign='center';
    ctx.fillText('DHL',96,108);
    // "סידור" text
    ctx.fillStyle='#FFCC00';
    ctx.font='bold 28px Arial';
    ctx.fillText('סידור עבודה',96,160);
    // Set as icon
    const link=document.createElement('link');
    link.rel='apple-touch-icon';
    link.href=c.toDataURL();
    document.head.appendChild(link);
    const link2=document.createElement('link');
    link2.rel='icon';
    link2.href=c.toDataURL();
    document.head.appendChild(link2);
  }catch(e){}
});
</script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700;800;900&display=swap');
:root{
  --dhl-red:#D40511;
  --dhl-yellow:#FFCC00;
  --dhl-dark:#1a1a1a;
  --dhl-gray:#f5f5f5;
  --dhl-border:#e8e8e8;
  --dhl-text:#1a1a1a;
  --dhl-muted:#888;
  --radius:8px;
  --shadow:0 2px 12px rgba(0,0,0,0.08);
  --shadow-md:0 4px 24px rgba(0,0,0,0.12);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Heebo',sans-serif;direction:rtl;background:#f2f2f2;color:var(--dhl-text);min-height:100vh;-webkit-tap-highlight-color:transparent}

/* ===== TOPBAR ===== */
.topbar{
  background:var(--dhl-red);
  color:#fff;
  padding:0 16px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  position:sticky;
  top:0;
  z-index:200;
  height:44px;
  box-shadow:0 2px 12px rgba(212,5,17,0.35)
}
.dhl-logo{background:var(--dhl-yellow);padding:5px 11px;border-radius:4px;display:flex;align-items:center;margin-left:10px;flex-shrink:0}
.dhl-logo-text{font-family:'Heebo',sans-serif;font-weight:900;font-size:18px;color:var(--dhl-red);letter-spacing:-1.5px;line-height:1}
.topbar-title{font-size:13px;font-weight:800;letter-spacing:0.2px}
.topbar-sub{font-size:9px;opacity:0.75;margin-top:1px;font-weight:500}
.topbar-right{display:flex;align-items:center;gap:6px;flex-wrap:nowrap;overflow:hidden}
.dhl-yellow-stripe{height:3px;background:var(--dhl-yellow)}

/* ===== TOPBAR BUTTONS ===== */
.mode-btn{padding:5px 12px;font-size:11px;border:1.5px solid rgba(255,255,255,0.45);border-radius:4px;cursor:pointer;background:transparent;color:#fff;font-family:inherit;font-weight:700;transition:all 0.18s;white-space:nowrap}
.mode-btn.active{background:#fff;color:var(--dhl-red);border-color:#fff}
.sign-btn{padding:5px 10px;font-size:11px;border:1.5px solid rgba(255,255,255,0.4);border-radius:4px;cursor:pointer;background:rgba(255,255,255,0.1);color:#fff;font-family:inherit;font-weight:700;transition:all 0.18s;white-space:nowrap}
.sign-btn:hover{background:rgba(255,255,255,0.22)}
.sign-btn:active{transform:scale(0.96)}
.user-pill{display:flex;align-items:center;gap:5px;background:rgba(0,0,0,0.18);border-radius:4px;padding:4px 9px;font-size:11px;font-weight:600;white-space:nowrap}
.user-pill img{width:20px;height:20px;border-radius:50%}

/* ===== MONTH NAV ===== */
.month-nav{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#fff;border-bottom:1px solid var(--dhl-border);box-shadow:0 1px 4px rgba(0,0,0,0.04)}
.month-nav button{border:1.5px solid var(--dhl-border);background:#fff;border-radius:4px;padding:5px 14px;cursor:pointer;font-size:14px;color:var(--dhl-red);font-weight:800;transition:all 0.18s;min-height:34px;min-width:34px}
.month-nav button:hover{background:var(--dhl-yellow);border-color:var(--dhl-yellow);color:#000}
.month-nav button:active{transform:scale(0.95)}
.month-label{font-size:16px;font-weight:800;color:var(--dhl-dark);flex:1;text-align:center}

/* ===== LEGEND ===== */
.legend{display:none}
.leg{display:flex;align-items:center;gap:4px;font-size:10px;color:var(--dhl-muted);font-weight:500}
.leg-dot{width:9px;height:9px;border-radius:2px}
.view-tag{padding:2px 9px;border-radius:3px;font-size:10px;font-weight:800;background:var(--dhl-yellow);color:var(--dhl-red);margin-right:auto}
.sync-tag{padding:2px 9px;border-radius:3px;font-size:10px;background:#e6f4ea;color:#1e5c2e;margin-right:4px;font-weight:600}

/* ===== TABLE WRAP ===== */
.schedule-wrap{overflow-x:auto;background:#fff;margin:12px;border-radius:var(--radius);box-shadow:var(--shadow);border:1px solid var(--dhl-border)}
table.sched{border-collapse:collapse;width:100%;font-size:13px}
table.sched th{background:#f5f5f5;padding:6px 2px;text-align:center;border:1px solid #e0e0e0;font-weight:700;color:#555;min-width:36px;white-space:nowrap;position:sticky;top:0;z-index:10}
table.sched th.emp-col{min-width:100px;text-align:right;padding-right:10px;position:sticky;right:0;z-index:20;background:#ebebeb}
table.sched th.role-col{display:none}
table.sched td{padding:2px;text-align:center;border:1px solid #ebebeb;height:34px}
table.sched td.emp-col{text-align:right;padding-right:10px;font-weight:700;font-size:12px;position:sticky;right:0;background:#fff;z-index:5;white-space:nowrap}
table.sched td.role-badge{display:none}
table.sched tr.role-header td{font-weight:800;font-size:11px;color:#fff;padding:5px 10px;text-align:right}
table.sched tr:hover td:not(.emp-col):not(.role-badge){background:#fffde7}
.cell-inner{width:100%;height:30px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;cursor:pointer;transition:opacity 0.15s}
.cell-inner:hover{opacity:0.75}
.cell-empty-btn{color:#ccc;font-size:18px;background:transparent;width:100%;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.cell-empty-btn:hover{color:var(--dhl-red)}

/* ===== SHIFT COLORS ===== */
.sh-a{background:#fff6cc;color:#7a5c00}
.sh-b{background:#e6f4ea;color:#1e5c2e}
.sh-c{background:#fce8dc;color:#7a2e00}
.sh-off{background:#f0e8fc;color:#5c2e8a}
.sh-mil{background:#daeaf8;color:#1a4a70}
.sh-sab{background:#fce4ec;color:#880e4f}
.sh-sick{background:#ffe0b2;color:#bf360c}
.sh-hv{background:#e8eaf6;color:#283593}
.sh-low{background:#e0f2f1;color:#004d40}
.sh-flight{background:#e1f5fe;color:#01579b}
.sh-report{background:#f3e5f5;color:#4a148c}
.sh-d{background:#fff9c4;color:#6d4c00}
.sh-e{background:#dcedc8;color:#1b5e20}
.sh-f{background:#ffe0b2;color:#6d1f00}
.sh-g{background:#e0f7fa;color:#006064}
.sh-motz{background:#e8eaf6;color:#1a237e}
.sh-audit{background:#fce4ec;color:#6a1b4d}

/* ===== NOTE BAR ===== */
.note-bar{display:flex;gap:8px;align-items:center;padding:8px 14px;background:#fffbea;border-bottom:1px solid #f0e8b0;flex-wrap:wrap;font-size:13px;color:#7a5c00}
.note-bar select,.note-bar input{padding:5px 10px;font-size:12px;border:1px solid #d0c080;border-radius:4px;background:#fff;color:#333;font-family:inherit}
.note-bar input{flex:1;min-width:160px}
.note-bar button{padding:5px 12px;font-size:12px;border:1px solid #c0a020;border-radius:4px;cursor:pointer;background:#fff8dc;color:#7a5c00;font-family:inherit;font-weight:600}

/* ===== SUMMARY ===== */
.summary-section{margin:0 12px 20px;background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);overflow:hidden;border:1px solid var(--dhl-border)}
.summary-section h2{font-size:14px;font-weight:800;padding:12px 16px;border-bottom:3px solid var(--dhl-yellow);color:var(--dhl-red);background:#fafafa}
.sum-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;padding:12px 14px}
.sum-card{background:#f8f8f8;border-radius:var(--radius);padding:12px;text-align:center;border:1px solid var(--dhl-border)}
.sum-card .val{font-size:26px;font-weight:900;color:var(--dhl-red)}
.sum-card .lbl{font-size:10px;color:var(--dhl-muted);margin-top:2px;font-weight:600}
.emp-sum-table{width:100%;border-collapse:collapse;font-size:12px;margin:0 0 16px}
.emp-sum-table th{background:#f5f5f5;padding:7px 8px;text-align:center;border:1px solid #e0e0e0;font-weight:700;color:#555;font-size:11px}
.emp-sum-table th:first-child{text-align:right}
.emp-sum-table td{padding:6px 8px;border:1px solid #ebebeb;text-align:center;vertical-align:middle}
.emp-sum-table td:first-child{text-align:right;font-weight:700}
.emp-sum-table tr:nth-child(even){background:#fafafa}
.week-view-wrap{margin:12px;direction:rtl}
.week-view-header{display:flex;align-items:center;justify-content:space-between;background:#fff;border-radius:var(--radius) var(--radius) 0 0;padding:10px 14px;border:1px solid var(--dhl-border);border-bottom:none}
.week-view-title{font-size:15px;font-weight:800;color:var(--dhl-dark)}
.week-view-nav{display:flex;gap:8px;align-items:center}
.week-view-nav button{border:1.5px solid var(--dhl-border);background:#fff;border-radius:4px;padding:3px 12px;cursor:pointer;font-size:14px;color:var(--dhl-red);font-weight:800}
.week-view-nav button:hover{background:var(--dhl-yellow);border-color:var(--dhl-yellow)}
.week-days-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:0;border:1px solid var(--dhl-border);border-radius:0 0 var(--radius) var(--radius);overflow:hidden;background:#fff}
.week-day-col{border-left:1px solid var(--dhl-border);min-width:0}
.week-day-col:last-child{border-left:none}
.week-day-header{background:#f5f5f5;padding:8px 4px;text-align:center;font-size:12px;font-weight:800;color:#555;border-bottom:2px solid var(--dhl-border)}
.week-day-header.is-today{background:var(--dhl-yellow);color:var(--dhl-red)}
.week-day-header.is-shabbat{background:#fde8e8}
.week-day-header.is-friday{background:#FFF3CC}
.week-emp-row{padding:3px 4px;border-bottom:1px solid #f0f0f0;display:flex;flex-direction:column;align-items:center;gap:2px;min-height:50px;justify-content:center}
.week-emp-row:last-child{border-bottom:none}
.week-emp-name{font-size:10px;font-weight:700;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:100%;text-align:center}
.week-shift-badge{font-size:10px;font-weight:700;padding:2px 6px;border-radius:2px;white-space:nowrap}
.week-emp-labels{display:flex;flex-direction:column;gap:1px;width:100%}
.week-emp-label-row{font-size:10px;padding:2px 4px;display:flex;align-items:center;gap:3px;border-bottom:1px solid #f5f5f5}
.week-emp-label-row:last-child{border-bottom:none}
.week-bar{height:10px;border-radius:2px;min-width:4px}
.role-pill{display:inline-block;padding:1px 7px;border-radius:2px;font-size:10px;font-weight:700;color:#fff}

/* ===== POPUP / OVERLAY ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.45);z-index:998;backdrop-filter:blur(2px)}
.popup{
  position:fixed;
  top:50%;left:50%;
  transform:translate(-50%,-50%);
  background:#fff;
  border-radius:12px;
  padding:20px;
  z-index:999;
  width:min(360px,92vw);
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 20px 60px rgba(0,0,0,0.22);
  border-top:4px solid var(--dhl-red)
}
.popup h3{font-size:14px;font-weight:800;margin-bottom:12px;color:var(--dhl-dark)}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px}
.shift-opt{padding:9px;border:1.5px solid var(--dhl-border);border-radius:6px;cursor:pointer;text-align:center;font-size:12px;font-weight:700;transition:all 0.15s}
.shift-opt:hover{border-color:var(--dhl-red)}
.shift-opt.selected{border-color:var(--dhl-red);border-width:2px;box-shadow:0 0 0 3px rgba(212,5,17,0.1)}
.popup-actions{display:flex;gap:8px;justify-content:flex-end}
.popup-actions button{padding:8px 18px;font-size:13px;border:1.5px solid var(--dhl-border);border-radius:6px;cursor:pointer;background:#fff;color:#333;font-family:inherit;font-weight:700}
.btn-save{background:var(--dhl-red) !important;color:#fff !important;border-color:var(--dhl-red) !important}

/* ===== SETUP BOX ===== */
.setup-box{max-width:500px;margin:40px auto;background:#fff;border-radius:12px;padding:28px;box-shadow:var(--shadow-md);border-top:4px solid var(--dhl-red)}
.setup-box h2{font-size:18px;font-weight:800;margin-bottom:8px;color:var(--dhl-red)}
.setup-box p{font-size:13px;color:#555;margin-bottom:18px;line-height:1.6}
.setup-box input{width:100%;padding:9px 12px;font-size:13px;border:1.5px solid var(--dhl-border);border-radius:6px;margin-bottom:10px;font-family:inherit}
.setup-box button{width:100%;padding:10px;font-size:14px;font-weight:700;background:var(--dhl-red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit}
.setup-step{display:flex;gap:10px;margin-bottom:12px;font-size:12px;color:#444;align-items:flex-start;line-height:1.5}
.step-num{min-width:22px;height:22px;border-radius:50%;background:var(--dhl-red);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:11px}

/* ===== TOAST ===== */
.toast{
  position:fixed;
  bottom:24px;
  left:50%;
  transform:translateX(-50%);
  background:#111;
  color:#fff;
  padding:10px 22px;
  border-radius:6px;
  font-size:13px;
  z-index:9999;
  opacity:0;
  transition:opacity 0.25s;
  font-weight:600;
  border-right:4px solid var(--dhl-yellow);
  max-width:90vw;
  text-align:center
}
.toast.show{opacity:1}
.day-note-mark{font-size:9px;color:#7a5c00}

/* ===== EMP MANAGER ===== */
.emp-mgr{position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:999;display:flex;align-items:center;justify-content:center}
.emp-mgr-box{background:#fff;border-radius:12px;padding:22px;width:min(600px,95vw);max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-md);border-top:4px solid var(--dhl-red)}
.emp-mgr-box h2{font-size:16px;font-weight:800;margin-bottom:12px;color:var(--dhl-red)}
.emp-mgr-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 1fr 34px;gap:5px;margin-bottom:5px;align-items:center}
.emp-mgr-row input,.emp-mgr-row select{padding:6px 8px;font-size:12px;border:1.5px solid var(--dhl-border);border-radius:4px;font-family:inherit;font-weight:500}
.emp-mgr-del{background:#fff0f0;border:1.5px solid #ffb0b0;border-radius:4px;cursor:pointer;font-size:13px;color:#c00;padding:4px;min-height:32px}
.emp-mgr-add{padding:7px 14px;font-size:12px;background:var(--dhl-yellow);color:var(--dhl-red);border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:800}
.emp-mgr-save{padding:8px 18px;font-size:13px;background:var(--dhl-red);color:#fff;border:none;border-radius:6px;cursor:pointer;font-family:inherit;font-weight:700}
.emp-mgr-cancel{padding:8px 13px;font-size:13px;background:#fff;color:#333;border:1.5px solid var(--dhl-border);border-radius:6px;cursor:pointer;font-family:inherit;font-weight:600}

/* ===== REQUEST SYSTEM ===== */
.req-btn{position:fixed;bottom:22px;left:22px;z-index:500;background:var(--dhl-red);color:#fff;border:none;border-radius:6px;padding:12px 18px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(212,5,17,0.4)}
.bell-btn{position:relative;display:inline-flex;align-items:center;gap:5px;padding:5px 12px;font-size:11px;border:1.5px solid rgba(255,255,255,0.45);border-radius:4px;cursor:pointer;background:transparent;color:#fff;font-family:inherit;font-weight:700}
.bell-badge{position:absolute;top:-6px;right:-6px;background:var(--dhl-yellow);color:var(--dhl-red);border-radius:50%;width:17px;height:17px;font-size:10px;font-weight:800;display:flex;align-items:center;justify-content:center}
.req-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.req-modal{align-items:center}}
.req-box{
  background:#fff;
  border-radius:16px 16px 0 0;
  padding:22px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 -4px 40px rgba(0,0,0,0.2);
  border-top:4px solid var(--dhl-red)
}
@media(min-width:600px){
  .req-box{border-radius:12px;width:500px;max-height:85vh}
}
.req-box h2{font-size:16px;font-weight:800;margin-bottom:14px;color:var(--dhl-red)}
.req-form label{font-size:12px;color:#555;display:block;margin-bottom:3px;margin-top:10px;font-weight:600}
.req-form select,.req-form input,.req-form textarea{width:100%;padding:8px 10px;font-size:13px;border:1.5px solid var(--dhl-border);border-radius:6px;font-family:inherit}
.req-form textarea{resize:vertical;min-height:70px}
.req-card{border:1.5px solid var(--dhl-border);border-radius:8px;padding:12px 14px;margin-bottom:10px;background:#fafafa}
.req-card .req-meta{font-size:11px;color:#888;margin-bottom:4px;font-weight:500}
.req-card .req-name{font-size:13px;font-weight:700;color:var(--dhl-dark);margin-bottom:2px}
.req-card .req-type{display:inline-block;padding:2px 8px;border-radius:3px;font-size:11px;font-weight:700;background:var(--dhl-yellow);color:var(--dhl-red);margin-bottom:6px}
.req-card .req-note{font-size:12px;color:#555;margin-top:4px}
.status-pending{color:#f57c00;font-weight:700;font-size:11px}
.status-approved{color:#2e7d32;font-weight:700;font-size:11px}
.status-rejected{color:#c62828;font-weight:700;font-size:11px}
.req-actions{display:flex;gap:6px;margin-top:10px}
.btn-approve{padding:6px 14px;font-size:12px;background:#2e7d32;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700}
.btn-reject{padding:6px 14px;font-size:12px;background:#c62828;color:#fff;border:none;border-radius:4px;cursor:pointer;font-family:inherit;font-weight:700}
.admin-note-inp{width:100%;padding:6px 8px;font-size:12px;border:1.5px solid var(--dhl-border);border-radius:4px;margin-top:6px;font-family:inherit}
.emp-req-card{border:1.5px solid var(--dhl-border);border-radius:8px;padding:10px 12px;margin-bottom:8px;background:#fafafa}

/* ===== PERSONAL / COPY MODALS ===== */
.personal-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:flex-end;justify-content:center}
@media(min-width:600px){.personal-modal{align-items:center}}
.personal-box{
  background:#fff;
  border-radius:16px 16px 0 0;
  padding:22px;
  width:100%;
  max-height:90vh;
  overflow-y:auto;
  box-shadow:0 -4px 40px rgba(0,0,0,0.2);
  border-top:4px solid var(--dhl-red)
}
@media(min-width:600px){
  .personal-box{border-radius:12px;width:480px;max-height:85vh}
}
.personal-box h2{font-size:16px;font-weight:800;margin-bottom:14px;color:var(--dhl-red)}
.shift-day-card{border:1.5px solid var(--dhl-border);border-radius:6px;padding:10px 14px;margin-bottom:8px;display:flex;justify-content:space-between;align-items:center}

const ADMIN_PASSWORD='DHL123';

let employees=JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT));
let state={mode:"view",year:2026,month:new Date().getMonth(),schedule:{},notes:{},cellNotes:{},popup:null,noteDay:1,user:null,adminUid:null,configured:false,showEmpMgr:false,teamMsg:'',showPersonal:false,personalEmp:'',showPwdForm:false,waNotif:false,weekView:false,weekOffset:0,empView:false,empViewMode:'week',filterEmp:'',showVacationMgr:false,vacationData:{},vacationLive:null,vacationSyncing:false,vacationYearSchedule:{},vacationScheduleYear:null,vacationNextJanHours:{},vacationSortKey:'live',vacationSortDir:'asc'};

window.toggleWeekView=function(){
  state.weekView=!state.weekView;
  if(state.weekView){
    // Set week offset to show current week
    const today=new Date();
    const todayDay=today.getDate();
    const todayMonth=today.getMonth();
    const todayYear=today.getFullYear();
    if(todayMonth===state.month&&todayYear===state.year){
      // Find which week today is in
      const days=getDays();
      let weekNum=0,wCur=[];
      days.forEach(({d,wd})=>{
        if(wd===0&&wCur.length){weekNum++;wCur=[];}
        wCur.push(d);
        if(d===todayDay) state.weekOffset=weekNum;

window.changeWeek=function(dir){
  const weeks=getWeeks();

function loadConfig(){
  try{const c=localStorage.getItem("seder_fb_config");if(c){firebaseConfig=JSON.parse(c);return true;}}catch(e){}
  return false;
}
function saveConfig(cfg){localStorage.setItem("seder_fb_config",JSON.stringify(cfg));localStorage.setItem("seder_admin_uid","pending");}

function initFirebase(cfg){
  try{
    app=initializeApp(cfg);
    auth=getAuth(app);
    db=getDatabase(app);
    state.configured=true;
    onAuthStateChanged(auth,user=>{
      state.user=user;
      if(user){
        // Save admin UID to Firebase on first login
        get(ref(db,"adminUid")).then(snap=>{
          if(!snap.val()){
            set(ref(db,"adminUid"),user.uid);
            state.adminUid=user.uid;
          } else {
            state.adminUid=snap.val();
          }
          state.mode=user.uid===state.adminUid?"admin":"view";
          if(state.mode==="admin"&&state.adminUid==="password-admin") state.mode="admin";
          render();
        });
      } else {
        state.mode="view";
      }
      listenToData();
      render();
    });
  }catch(e){alert("שגיאה בהתחברות ל-Firebase. בדוק את ההגדרות.");state.configured=false;render();}
}

function buildDefaultSchedule(){
  const n=daysInMonth(state.year,state.month);
  const sched={};
  for(let d=1;d<=n;d++){
    const wd=ilWD(state.year,state.month,d);
    if(wd>=0&&wd<=4){employees.forEach(emp=>{sched[emp.name+"|"+d]="A";});}
  }
  return sched;
}
// ===== BIRTHDAY DATA =====
const BIRTHDAY_DATA={
  "ראם":"23/02",
  "ליאור":"08/03",
  "צאלה":"12/03",
  "שניר":"02/04",
  "חיים":"05/04",
  "גיא":"04/05",
  "חגי":"05/05",
  "רועי":"05/05",
  "מירית":"25/05",
  "מירי":"25/05",
  "אייל":"10/06",
  "עידן":"27/06",
  "אבבה":"05/07",
  "משה":"04/08",
  "שירלי":"14/08",
  "אור":"23/08",
  "אהובה":"31/08",
  "ניר":"11/09",
  "סתיו":"16/09",
  "מזל":"08/10",
  "דלית":"10/10",
  "איילה":"24/10",
  "ייטב":"29/11",
  "אדן":"30/12"
};
function mergeBirthdays(empList){
  return empList.map(e=>({...e,birthday:e.birthday||BIRTHDAY_DATA[e.name]||''}));
}
// ===== END BIRTHDAY DATA =====

function listenToData(){
  if(!db)return;
  // Load employees list
  onValue(ref(db,'employees'),(snap)=>{
    const data=snap.val();
    if(data&&Array.isArray(data)&&data.length>0){employees=mergeBirthdays(data);}
    else{employees=mergeBirthdays(JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT)));}
    recalcVacationLive();render();
  });
  listenToRequests();
  onValue(ref(db,'vacationBalance'),(snap)=>{
    state.vacationData=snap.val()||{};
    // Figure out which year's schedule this report refers to, and make sure we're listening to it
    const records=Object.values(state.vacationData||{});
    const sample=records.find(r=>r.month&&r.month.includes('/'));
    const vacYear=sample?(parseInt(sample.month.split('/')[1])||state.year):state.year;
    ensureVacationYearListeners(vacYear);
    recalcVacationLive();
    render();
  });
  onValue(ref(db,'teamMsg'),(snap)=>{
    state.teamMsg=snap.val()||'';
    render();
  });
  const key=`seder_${state.year}_${state.month}`;
  onValue(ref(db,key),(snap)=>{
    const data=snap.val()||{};
    if(data.schedule && Object.keys(data.schedule).length>0){
      // Merge cloud data ON TOP of default schedule
      const def=buildDefaultSchedule();
      state.schedule={...def,...data.schedule};
    } else {
      state.schedule=buildDefaultSchedule();
    }
    state.notes=data.notes||{};
    state.cellNotes=data.cellNotes||{};
    render();
  });
}

// Hours deducted per vacation day, by day-of-week: Tue=8h, Fri/Sat=0h (not workdays), else=9h
function hoursForDow(dow){return dow===2?8:(dow===5||dow===6)?0:9;}

function computeMonthHours(schedObj,vacYear,m){
  const map={}; // name -> {day: hours}
  Object.entries(schedObj||{}).forEach(([key,val])=>{
    if(val!=='OFF')return;
    const [name,dayStr]=key.split('|');
    const day=parseInt(dayStr);
    if(!day)return;
    const dow=new Date(vacYear,m,day).getDay();
    const h=hoursForDow(dow);
    if(h<=0)return; // Friday/Saturday never deduct from balance
    if(!map[name])map[name]={};
    map[name][day]=(map[name][day]||0)+h;
  });
  return map;
}

// Sets up persistent real-time listeners on all 12 months of the given year's schedule,
// so vacation balances recalculate automatically the moment anything changes in the schedule.
// Also listens to January of the FOLLOWING year — since contracts run monthly, employees can still
// use up this year's leftover vacation in January before the 3-day carryover cap is actually enforced.
function ensureVacationYearListeners(vacYear){
  if(!db)return;
  if(state.vacationScheduleYear===vacYear)return; // already listening to this year
  state.vacationScheduleYear=vacYear;
  state.vacationYearSchedule={};
  state.vacationNextJanHours={};
  for(let m=0;m<12;m++){
    onValue(ref(db,`seder_${vacYear}_${m}`),(snap)=>{
      const data=snap.val()||{};
      state.vacationYearSchedule[m]=computeMonthHours(data.schedule||{},vacYear,m);
      recalcVacationLive();
      render();
    });
  }
  onValue(ref(db,`seder_${vacYear+1}_0`),(snap)=>{
    const data=snap.val()||{};
    state.vacationNextJanHours=computeMonthHours(data.schedule||{},vacYear+1,0);
    recalcVacationLive();
    render();
  });
}

// Pure (synchronous) recalculation of live vacation balances from whatever is currently cached
// (state.vacationData, state.vacationYearSchedule, employees). Called automatically on any change.
function recalcVacationLive(){
  const records=Object.values(state.vacationData||{});
  if(records.length===0){state.vacationLive=null;return;}
  const monthData=state.vacationYearSchedule||{}; // monthData[m] = {name:{day:hours}}
  if(Object.keys(monthData).length===0){state.vacationLive=null;return;} // schedule not loaded yet

  const VACATION_NAME_ALIAS={"אדן":"אילנה","מירי":"מירית"};
  const vacYear=state.vacationScheduleYear;

  const empIdToName={};
  employees.forEach(e=>{if(e.empId)empIdToName[e.empId]=e.name;});

  const today=new Date();
  const realYear=today.getFullYear();
  const realMonthIdx=(realYear===vacYear)?today.getMonth():11;
  const realDay=(realYear===vacYear)?today.getDate():31;

  const live={};
  records.forEach(r=>{
    const name=empIdToName[r.empId]||VACATION_NAME_ALIAS[r.firstName]||null;
    const monthlyRate=Number(r.monthlyHours)||0;
    const baseline=Number(r.newBalance)||0;
    // Anchor on the exact moment this row was imported (day-precision), not just the report's stated month.
    // This is critical: the report is "correct as of the moment it was pulled" — so days on/before that
    // moment must NOT be recounted from the schedule, or they'd be subtracted twice.
    const importDate=r.updatedAt?new Date(r.updatedAt):today;
    const sameYear=importDate.getFullYear()===vacYear;
    const baselineMonthIdx=sameYear?importDate.getMonth():-1;
    const baselineDay=sameYear?importDate.getDate():31;
    if(!name){
      live[r.empId]={matched:false};
      return;
    }
    let elapsedHoursSinceReport=0,futureHours=0;
    for(let m=Math.max(0,baselineMonthIdx);m<12;m++){
      const dayMap=(monthData[m]&&monthData[m][name])||{};
      Object.entries(dayMap).forEach(([dayStr,h])=>{
        const day=parseInt(dayStr);
        // Skip anything on/before the exact import moment — already reflected in the imported balance
        if(m===baselineMonthIdx&&day<=baselineDay)return;
        const isPastOrToday=(m<realMonthIdx)||(m===realMonthIdx&&day<=realDay);
        if(isPastOrToday) elapsedHoursSinceReport+=h; else futureHours+=h;
      });
    }
    const monthsSinceReport=Math.max(0,realMonthIdx-baselineMonthIdx);
    const monthsToYearEnd=Math.max(0,11-baselineMonthIdx);
    const newBalanceLive=baseline+monthlyRate*monthsSinceReport-elapsedHoursSinceReport;
    const projectedYearEnd=baseline+monthlyRate*monthsToYearEnd-(elapsedHoursSinceReport+futureHours);
    // Contracts run monthly, so this year's leftover balance can still be used up in January
    // before the 3-day carryover cap is actually enforced — net out whatever's already scheduled there.
    const nextJanMap=(state.vacationNextJanHours&&state.vacationNextJanHours[name])||{};
    const januaryHours=Object.values(nextJanMap).reduce((s,h)=>s+h,0);
    const CAP_HOURS=27; // 3 days carryover, at the standard 9h/day
    const forfeitAtYearEnd=Math.max(0,projectedYearEnd-januaryHours-CAP_HOURS);
    live[r.empId]={matched:true,name,usedHoursSinceReport:elapsedHoursSinceReport,futureHours,januaryHours,newBalanceLive,projectedYearEnd,forfeitAtYearEnd};
  });
  state.vacationLive=live;
}

function saveToCloud(){
  if(!db)return;
  const key=`seder_${state.year}_${state.month}`;
  set(ref(db,key),{schedule:state.schedule,notes:state.notes,cellNotes:state.cellNotes||{}});
}

function ilWD(y,m,d){return new Date(y,m,d).getDay();}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getDays(){const n=daysInMonth(state.year,state.month);return Array.from({length:n},(_,i)=>({d:i+1,wd:ilWD(state.year,state.month,i+1)}));}

function getWeeks(){
  const days=getDays();
  const weeks=[];let cur=[];
  days.forEach(({d,wd})=>{
    if(wd===0&&cur.length){weeks.push(cur);cur=[];}
    cur.push({d,wd});
  });
  if(cur.length)weeks.push(cur);
  return weeks;
}

function buildWeekView(isAdmin){
  const weeks=getWeeks();
  const wi=Math.min(state.weekOffset,weeks.length-1);
  const week=weeks[wi]||[];
  const DAYS_FULL=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const today=new Date();
  const showEmps=state.personalEmp&&!isAdmin?employees.filter(e=>e.name===state.personalEmp):employees;
  const roles=[...new Set(showEmps.map(e=>e.role))];

  return `<div class="week-view-wrap">
    <div class="week-view-header">
      <div class="week-view-title">שבוע ${wi+1} — ${MONTHS[state.month]} ${state.year}</div>

        <button onclick="changeWeek(1)" ${wi===weeks.length-1?'disabled style="opacity:0.3"':''}>&#8594;</button>
      </div>
    </div>
    <div style="overflow-x:auto;background:#fff;border:1px solid var(--dhl-border);border-top:none;border-radius:0 0 4px 4px">
      <table style="border-collapse:collapse;width:100%;font-size:12px;min-width:320px">
        <thead>
          <tr style="background:#f5f5f5">
            <th style="padding:8px 10px;text-align:right;border:1px solid #e0e0e0;font-weight:800;color:#555;min-width:80px;position:sticky;right:0;background:#f0f0f0;z-index:5">עובד</th>
            ${week.map(({d,wd})=>{
              const isToday=today.getDate()===d&&today.getMonth()===state.month&&today.getFullYear()===state.year;
              const isSab=wd===6;
              const isFri=wd===5;

window.copyDailyDist=function(){

    // Role header
    html+=`<tr><td style="background-color:${rc};color:#ffffff;font-weight:bold;font-size:11px;padding:3px 8px">${role}</td></tr>`;

    // Column headers
    html+=`<tr>`;

    html+=`<tr style="background-color:#f0f0f0">`;
    html+=`<td style="padding:4px 8px;font-size:11px;font-weight:bold;border:1px solid #cccccc;width:90px">שם</td>`;
    html+=`<td style="padding:4px 8px;font-size:11px;font-weight:bold;border:1px solid #cccccc">אחריות</td>`;
    html+=`</tr>`;

    working.forEach((emp,i)=>{
      const inp=document.getElementById('resp-'+emp.name);
      const resp=inp?inp.value.trim():'';

      html+=`<td style="padding:4px 8px;font-size:12px;border:1px solid #dddddd;color:${resp?'#1a1a1a':'#999999'}">${resp||''}</td>`;
      html+=`</tr>`;
    });
    html+=`</table></td></tr>`;
    html+=`<tr><td style="padding:4px 0"></td></tr>`;
  });
  html+=`</table>`;

  const blob=new Blob([html],{type:'text/html'});
  const item=new ClipboardItem({'text/html':blob});
  navigator.clipboard.write([item]).then(()=>{
    const btn=document.getElementById('daily-copy-btn');
    if(btn){btn.textContent='✅ הועתק! פתח Outlook והדבק';btn.classList.add('daily-copied');setTimeout(()=>{btn.textContent='📋 העתק למייל Outlook';btn.classList.remove('daily-copied');},3000);}

function getWeekIndex(d){
  // Returns 0-based week index for a given day number
  const firstWD=ilWD(state.year,state.month,0);
  // day d (1-based), find which week it falls in
  const dayIdx=d-1;
  const adjustedIdx=dayIdx+firstWD;
  return Math.floor(adjustedIdx/7);
}

const WEEK_BG=[
  "rgba(31,78,121,0.06)",
  "rgba(55,86,35,0.06)",
  "rgba(131,60,0,0.06)",
  "rgba(112,48,160,0.06)",

];

function buildTable(days,isAdmin){
  const roles=[...new Set(employees.map(e=>e.role))];
  // Build birthday map: day -> [names]
  const bdayMap={};
  employees.forEach(emp=>{
    if(!emp.birthday) return;
    const parts=emp.birthday.split('/');
    if(parts.length!==2) return;
    const dd=parseInt(parts[0]),mm=parseInt(parts[1]);
    if(isNaN(dd)||isNaN(mm)) return;
    if(mm-1===state.month){
      if(!bdayMap[dd]) bdayMap[dd]=[];
      bdayMap[dd].push(emp.name);
    }
  });
  let h=`<table class="sched"><thead><tr>
    <th class="emp-col">שם</th>
    ${days.map(({d,wd})=>{
      const isFri=wd===5,isSat=wd===6;
      const today=new Date();
      const isToday=today.getDate()===d&&today.getMonth()===state.month&&today.getFullYear()===state.year;
      const bg=isToday?"background:var(--dhl-yellow)":isSat?"background:#FFBBBB":isFri?"background:#FFE0A0":"";
      const fc=isToday?"color:var(--dhl-red);font-weight:900":isSat?"color:#a00":isFri?"color:#1a4a8a":"";
      const todayBorder=isToday?"border-left:3px solid var(--dhl-red);border-right:3px solid var(--dhl-red)":"";
      const note=state.notes[state.year+"-"+state.month+"-"+d];
      const wkBg=WEEK_BG[getWeekIndex(d)%WEEK_BG.length];
      const wkStyle=(!isFri&&!isSat&&!isToday)?`background:${wkBg}`:"";
      const finalBg=isToday?"background:var(--dhl-yellow)":isSat?"background:#FFBBBB":isFri?"background:#FFE0A0":wkStyle;
      const bdayNames=bdayMap[d]||[];
      const bdayNote=bdayNames.map(n=>`🎂 יום הולדת שמח ${n}!`).join(' | ');
      const combinedNote=[note,bdayNote].filter(Boolean).join(' | ');
      return `<th style="${finalBg};${fc};${todayBorder}">${isToday?'📍 ':''}${DAY_NAMES[wd]}<br><span style="font-weight:400;font-size:10px">${d}</span>${combinedNote?`<br><span style="font-size:9px;background:${bdayNote?'#fde8ff':'#fff3cd'};color:${bdayNote?'#7b1fa2':'#7a5c00'};padding:1px 4px;border-radius:3px;display:inline-block;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:normal;word-break:break-word;line-height:1.2" title="${combinedNote}">${combinedNote}</span>`:""}`;
    }).join("")}
    <th>סה"כ</th>
  </tr></thead><tbody>`;
  roles.forEach(role=>{
    const rc=ROLE_COLORS[role]||"#333";
    h+=`<tr class="role-header"><td colspan="${days.length+2}" style="background:${rc}">${role}</td></tr>`;
    employees.filter(e=>e.role===role&&(!state.filterEmp||e.name===state.filterEmp)).forEach((emp,ei)=>{
      const bg=ei%2===0?"background:#f9fafd":"";
      let tot=0;
      const cells=days.map(({d,wd})=>{
        const isFri=wd===5,isSat=wd===6;
        const k=getShift(emp.name,d);
        const si=shiftInfo(k);
        if(["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(si.key)) tot++;
        const wkColor=WEEK_BG[getWeekIndex(d)%WEEK_BG.length];
        const isToday2=new Date().getDate()===d&&new Date().getMonth()===state.month&&new Date().getFullYear()===state.year;const bgCell=isToday2?"background:#FFFACD;border-left:2px solid var(--dhl-red);border-right:2px solid var(--dhl-red)":isSat?"background:#FFBBBB":isFri?"background:#FFE0A0":`background:${wkColor}`;
        if(k){
          const cn=getCellNote(emp.name,d);
          return `<td style="${bgCell}"><div class="cell-inner ${si.cls}" ${isAdmin?`onclick="openPopup('${emp.name.replace(/'/g,"\\'")}',${d})"`:""} title="${cn?cn:si.label}">${si.label}${cn?`<span style="display:block;font-size:8px;opacity:0.8;overflow:hidden;max-width:34px;white-space:nowrap;text-overflow:ellipsis">${cn}</span>`:""}</div></td>`;
        }
        const cnEmpty=getCellNote(emp.name,d);
        if(cnEmpty){
          return `<td style="${bgCell}"><div class="cell-inner" style="background:#f5f5f5;color:#555;flex-direction:column;height:auto;min-height:26px;padding:2px" ${isAdmin?`onclick="openPopup('${emp.name.replace(/'/g,"\'")}',${d})"`:""}>
            <span style="font-size:8px;color:#aaa">ריק</span>
            <span style="font-size:8px;color:#555;max-width:34px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${cnEmpty}">${cnEmpty}</span>
          </div></td>`;
        }
        return `<td style="${bgCell}">${isAdmin?`<div class="cell-empty-btn" onclick="openPopup('${emp.name.replace(/'/g,"\\'")}',${d})">+</div>`:'<div style="color:#dde;text-align:center;font-size:12px">—</div>'}</td>`;
      }).join("");
      const empDisplayName=state.filterEmp===emp.name?`<span style="background:var(--dhl-red);color:#fff;border-radius:3px;padding:1px 5px">${emp.name}</span>`:emp.name;
      h+=`<tr style="${bg}"><td class="emp-col" onclick="filterByEmp(this.dataset.name)" data-name="${emp.name}" style="cursor:pointer;user-select:none" title="לחץ לסנן">${empDisplayName}</td>${cells}<td style="font-weight:700;color:#D40511;font-size:12px">${tot}</td></tr>`;
    });
  });
  return h+`</tbody></table>`;}

function buildSummary(days,isAdmin){
  const weeks=[];let cur=[];
  days.forEach(({d,wd})=>{if(wd===0&&cur.length){weeks.push(cur);cur=[];}cur.push({d,wd});});
  if(cur.length)weeks.push(cur);

  // Filter employees based on mode
  const personalEmp = state.personalEmp;
  const showAll = isAdmin || !personalEmp;
  const filteredEmps = showAll ? employees : employees.filter(e=>e.name===personalEmp);

  const tS=filteredEmps.reduce((a,e)=>a+days.filter(({d})=>["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(getShift(e.name,d))).length,0);
  const tO=filteredEmps.reduce((a,e)=>a+days.filter(({d})=>getShift(e.name,d)==="OFF").length,0);
  const tM=filteredEmps.reduce((a,e)=>a+days.filter(({d})=>getShift(e.name,d)==="MIL").length,0);
  return `<div class="summary-section">
    <h2>סיכום חודשי${!showAll?` — ${personalEmp}`:''}</h2>
    <div class="sum-cards">
      <div class="sum-card" style="grid-column:span 2;text-align:right;background:var(--color-background-primary);border:0.5px solid #d0d7e8">
        <div style="font-size:11px;color:#888;margin-bottom:6px">📢 הודעה לצוות</div>
        ${isAdmin?`
          <div style="display:flex;gap:6px;align-items:center">
            <input id="inline-msg-inp" value="${state.teamMsg||''}" placeholder="כתוב הודעה לכל הצוות..." 
              style="flex:1;padding:6px 10px;font-size:12px;border:0.5px solid #d0d7e8;border-radius:8px;font-family:inherit"
              oninput="state.teamMsg=this.value">
            <button onclick="window.saveTeamMsg()" style="padding:6px 12px;background:#D40511;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap">שמור</button>
            ${state.teamMsg?`<button onclick="window.clearTeamMsg()" style="padding:6px 10px;background:#fff0f0;color:#c00;border:0.5px solid #ffb0b0;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit">נקה</button>`:''}
          </div>
        `:`
          <div style="font-size:13px;font-weight:500;color:#D40511;min-height:28px">${state.teamMsg||'<span style="color:#bbb;font-style:italic;font-weight:400">אין הודעות כרגע</span>'}</div>
        `}
      </div>
      <div class="sum-card"><div class="val">${tO}</div><div class="lbl">ימי חופש</div></div>
      <div class="sum-card"><div class="val">${tM}</div><div class="lbl">מילואים</div></div>
    </div>
    <div style="padding:0 16px 16px">
    <table class="emp-sum-table">
      <thead><tr><th>עובד</th>${weeks.map((_,i)=>`<th>שבוע ${i+1}</th>`).join("")}<th>סה"כ</th><th>חופש</th></tr></thead>
      <tbody>${filteredEmps.map(emp=>{
        const rc=ROLE_COLORS[emp.role]||"#333";
        const wc=weeks.map(w=>w.filter(({d})=>["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(getShift(emp.name,d))).length);
        const tot=wc.reduce((a,b)=>a+b,0);
        const off=days.filter(({d})=>getShift(emp.name,d)==="OFF").length;
        const mx=Math.max(...wc,1);
        const hasOverwork=wc.some(v=>v>5);
        return `<tr style="${hasOverwork?'background:#fff5f5':''}">
          <td style="${hasOverwork?'color:#c62828;font-weight:700':''}">${emp.name}${hasOverwork?` <span style="font-size:10px;background:#ffebee;color:#c62828;padding:1px 5px;border-radius:8px;margin-right:4px">⚠️ מעל 5 ימים</span>`:''}</td>
          
          ${wc.map(v=>`<td style="${v>5?'background:#ffebee;color:#c62828;font-weight:700':''}"><div class="week-bar-wrap"><div class="week-bar" style="background:${v>5?'#c62828':rc};opacity:0.6;width:${Math.round(v/mx*40)}px"></div><span>${v}</span></div></td>`).join("")}
          <td style="font-weight:700;color:#D40511">${tot}</td>
          <td style="color:#5c2e8a">${off}</td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
  </div>`;}

window.executeCopy=function(){
  const toMonth=parseInt(document.getElementById('copy-to-month').value);
  const toYear=parseInt(document.getElementById('copy-to-year').value);
  if(isNaN(toMonth)||isNaN(toYear)){alert('בחר חודש ושנה');return;}
  if(toMonth===state.month&&toYear===state.year){alert('לא ניתן להעתיק לאותו חודש');return;}
  if(!confirm(`להעתיק את הסידור ל-${MONTHS[toMonth]} ${toYear}? פעולה זו תדרוס סידור קיים!`)) return;
  const newKey=`seder_${toYear}_${toMonth}`;
  const newSched={};
  // Copy schedule adjusting day numbers that exist in target month
  const targetDays=new Date(toYear,toMonth+1,0).getDate();
  Object.entries(state.schedule).forEach(([k,v])=>{
    const [emp,d]=k.split('|');
    if(parseInt(d)<=targetDays) newSched[k]=v;
  });
  set(ref(db,newKey),{schedule:newSched,notes:{},cellNotes:{}});
  showToast(`✓ הסידור הועתק ל-${MONTHS[toMonth]} ${toYear}!`);
  state.showCopy=false;
  render();
};

  const nextM=(state.month+1)%12;
  const nextY=state.month===11?state.year+1:state.year;
  return `<div class="copy-modal" onclick="if(event.target===this)closeCopy()">

let reqState={show:false, mode:'', selectedEmp:'', adminView:false};

function getPendingCount(){
  if(!window._allRequests) return 0;
  return window._allRequests.filter(r=>r.status==='pending').length;
}

function listenToRequests(){
  if(!db) return;
  onValue(ref(db,'requests'),(snap)=>{
    const data=snap.val()||{};
    window._allRequests=Object.entries(data).map(([id,v])=>({id,...v}));
    // Check for new responses for current employee
    if(!state.user && reqState.viewEmp){
      const myResponded=window._allRequests.filter(r=>
        r.empName===reqState.viewEmp && r.status!=='pending' && !r.seen
      );
      if(myResponded.length>0){
        showNotifBanner(`יש לך ${myResponded.length} תשובה חדשה לבקשה שלך!`);
      }
    }
    render();
  });
}

function showNotifBanner(msg){
  const b=document.createElement('div');
  b.className='notif-banner';
  b.textContent=msg;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),4000);
}

window.openEmpView=function(){state.empView=true;state.personalEmp='';state.empViewMode='week';render();};
window.closeEmpView=function(){state.empView=false;state.personalEmp='';render();};
window.setEmpViewMode=function(mode){state.empViewMode=mode;render()};
window.selectEmpAndView=function(name){
  const emp=employees.find(e=>e.name===name);
  const doLogin=function(){
    state.personalEmp=name;
    const weeks=getWeeks();
    const today=new Date();
    let wi=0;
    weeks.forEach((wk,i)=>{ if(wk.some(({d})=>d===today.getDate()&&today.getMonth()===state.month&&today.getFullYear()===state.year)) wi=i; });
    state.weekOffset=wi;
    // If came from "הגש בקשה" — open requests form directly
    if(state._afterLoginGoToRequests){
      state._afterLoginGoToRequests=false;
      state.empView=false;
      reqState={...reqState,show:true,mode:'emp-form',viewEmp:name,viewRole:emp?emp.role:''};
    }
    render();
  };
  if(!emp||!emp.empId){ doLogin(); return; }
  const input=prompt(`שלום ${name} 👋\nהכנס מספר עובד (5 ספרות):`);
  if(input===null){ state._afterLoginGoToRequests=false; return; }
  if(input.trim()===emp.empId){ doLogin(); }
  else { alert('❌ מספר עובד שגוי. נסה שוב.'); }
};

window.handleRequest=function(id,status){
  const noteEl=document.getElementById('note-'+id);
  const adminNote=noteEl?noteEl.value:'';
  set(ref(db,'requests/'+id+'/status'),status);
  set(ref(db,'requests/'+id+'/adminNote'),adminNote);
  set(ref(db,'requests/'+id+'/seen'),false);
  const req=(window._allRequests||[]).find(r=>r.id===id);
  // Helper: extract day number from YYYY-MM-DD
  function extractDay(dateStr){
    if(!dateStr) return null;
    const p=dateStr.split(/[-\/\.]/);
    if(p.length<2) return null;
    const p0=parseInt(p[0]);
    return p0>31?parseInt(p[2]):parseInt(p[0]);
  }
  if(status==='approved'&&req){
    const isOff=req.type==='חופש'||req.type==='יום חופש'||req.type==='חופשה';
    const isMultiOff=req.type==='חופשה רציפה';
    const isSabab=req.type==='בקשת סבב';
    if((isOff||isMultiOff||isSabab)&&req.date){
      const shiftKey=isSabab?'SAB':'OFF';
      let daysApplied=0;
      if(isMultiOff&&req.dateTo){
        // Parse dates as local (avoid UTC offset bug) by splitting manually
        function parseLocalDate(s){const p=s.split('-');return new Date(parseInt(p[0]),parseInt(p[1])-1,parseInt(p[2]));}
        const from=parseLocalDate(req.date);
        const to=parseLocalDate(req.dateTo);
        // Group days by month — we need to fetch+update each month's Firebase node
        const byMonth={};
        for(let dt=new Date(from);dt<=to;dt.setDate(dt.getDate()+1)){
          const dayNum=dt.getDate();
          const m=dt.getMonth();
          const y=dt.getFullYear();
          const mk=y+'_'+m;
          if(!byMonth[mk]) byMonth[mk]={y,m,days:[]};
          byMonth[mk].days.push(dayNum);
          daysApplied++;
        }
        // For each affected month — fetch current data, apply shifts, save back
        Object.values(byMonth).forEach(({y,m,days})=>{
          const fbKey='seder_'+y+'_'+m;
          get(ref(db,fbKey)).then(snap=>{
            const data=snap.val()||{};
            const sched=data.schedule||{};
            days.forEach(dayNum=>{sched[req.empName+'|'+dayNum]=shiftKey;});
            set(ref(db,fbKey),{...data,schedule:sched});
            // Update local state if currently viewing this month
            if(m===state.month&&y===state.year){
              days.forEach(dayNum=>setShift(req.empName,dayNum,shiftKey));
              render();
            }
          });
        });
        showToast('✅ אושר + '+shiftKey+' עודכן ל-'+daysApplied+' ימים בסידור');
      } else {
        // Single day — parse manually to avoid UTC offset
        function parseLocalDate2(s){const p=s.split('-');return{y:parseInt(p[0]),m:parseInt(p[1])-1,d:parseInt(p[2])};}
        const {y,m,d:dayNum}=parseLocalDate2(req.date);
        if(dayNum>=1&&dayNum<=31){
          const fbKey='seder_'+y+'_'+m;
          get(ref(db,fbKey)).then(snap=>{
            const data=snap.val()||{};
            const sched=data.schedule||{};
            sched[req.empName+'|'+dayNum]=shiftKey;
            set(ref(db,fbKey),{...data,schedule:sched});
            if(m===state.month&&y===state.year){
              setShift(req.empName,dayNum,shiftKey);
              render();
            }
          });
          showToast('✅ אושר + '+(isSabab?'סבב':'חופש')+' עודכן בסידור ליום '+dayNum);
        } else {
          showToast('✅ הבקשה אושרה');
        }
      }
    } else {
      showToast('✅ הבקשה אושרה');
    }
  } else {
    showToast('❌ הבקשה נדחתה');
  }
  if(state.waNotif&&req){
    const phone=getEmpPhone(req.empName);
    if(phone){
      if(confirm(`לשלוח הודעת WhatsApp ל${req.empName} על ${status==='approved'?'אישור':'דחיית'} הבקשה?`)){
        window.sendRequestWhatsApp(req.empName,phone,status,req.type,req.date);
      }
    }
  }
  render();
};

function parseVacationPaste(text){
  const lines=text.split('\n').map(l=>l.trim()).filter(l=>l);
  const records=[];
  for(const line of lines){
    let cols=line.split('\t').map(c=>c.trim());
    if(cols.length<11) cols=line.split(/\s{2,}/).map(c=>c.trim());
    cols=cols.filter(c=>c!=='');
    if(cols.length<11) continue;
    const [empId,first,last,type,month,quota,opening,accrued,used,monthly,newBal]=cols;
    if(!/^\d+$/.test(empId)) continue; // skip header row / junk
    const num=v=>{const n=parseFloat(String(v).replace(/,/g,''));return isNaN(n)?0:n;};
    records.push({
      empId,firstName:first,lastName:last,absenceType:type,month,
      annualQuota:num(quota),openingBalance:num(opening),accruedRight:num(accrued),
      usedAccrued:num(used),monthlyHours:num(monthly),newBalance:num(newBal),
      updatedAt:Date.now()
    });
  }
  return records;
}

window.saveVacationImport=async function(){
  const ta=document.getElementById('vac-paste');
  const text=ta?ta.value:'';
  const records=parseVacationPaste(text);
  if(records.length===0){alert('לא זוהו שורות תקינות. ודא שהעמודות מופרדות בטאבים (הדבקה ישירה מאקסל/פוקוס) ושמספר העובד הוא העמודה הראשונה.');return;}
  if(!db){alert('אין חיבור ל-Firebase');return;}
  const updates={};
  records.forEach(r=>{updates[r.empId]=r;});
  await update(ref(db,'vacationBalance'),updates);
  showToast('✅ עודכנו '+records.length+' רשומות חופשה');
  if(ta)ta.value='';
};

function buildVacationMgr(){
  let records=Object.values(state.vacationData||{});
  const fmtD=hours=>(Number(hours||0)/9).toFixed(1); // hours -> days, at the standard 9h/day
  const CAP_HOURS=27; // 3 days x 9h
  const live=state.vacationLive||null;
  const nowHoursOf=r=>{
    const L=live&&live[r.empId];
    return (L&&L.matched)?L.newBalanceLive:r.newBalance;
  };
  const yearEndHoursOf=r=>{
    const L=live&&live[r.empId];
    return (L&&L.matched)?L.projectedYearEnd:r.newBalance;
  };
  const throughJanHoursOf=r=>{
    const L=live&&live[r.empId];
    if(!(L&&L.matched))return r.newBalance;
    return L.projectedYearEnd-(L.januaryHours||0);
  };
  const forfeitHoursOf=r=>{
    const L=live&&live[r.empId];
    const base=throughJanHoursOf(r);
    return Math.max(0,base-CAP_HOURS);
  };
  const sortVal=(r,key)=>{
    switch(key){
      case 'empId':return r.empId;
      case 'name':return (r.firstName||'')+(r.lastName||'');
      case 'now':return nowHoursOf(r);
      case 'yearend':return yearEndHoursOf(r);
      case 'throughjan':return throughJanHoursOf(r);
      case 'forfeit':return forfeitHoursOf(r);
      default:return 0;
    }
  };
  const sk=state.vacationSortKey==='live'?'now':state.vacationSortKey; // migrate old default key
  const sd=state.vacationSortDir;
  records=records.slice().sort((a,b)=>{
    const va=sortVal(a,sk),vb=sortVal(b,sk);
    let cmp;
    if(typeof va==='string') cmp=va.localeCompare(vb,'he');
    else cmp=va-vb;
    return sd==='asc'?cmp:-cmp;
  });
  const th=(key,label,align)=>{
    const arrow=sk===key?(sd==='asc'?' ▲':' ▼'):'';
    return `<th onclick="setVacationSort('${key}')" style="padding:6px 8px;text-align:${align||'center'};border-bottom:2px solid #eee;cursor:pointer;user-select:none" title="לחץ למיון">${label}${arrow}</th>`;
  };
  return `<div class="emp-mgr" onclick="if(event.target===this)closeVacationMgr()">
    <div class="emp-mgr-box" style="width:min(820px,96vw)">
      <h2>🏖️ ימי חופש</h2>
      <div style="display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap;align-items:center">
        ${records.length===0?`<button onclick="seedVacationJune2026()" style="padding:8px 14px;font-size:12px;background:var(--dhl-yellow);color:var(--dhl-red);border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:800">📥 טען נתוני יוני 2026</button>`:""}
        ${records.length>0?`<button onclick="syncVacationFromSchedule()" style="padding:8px 14px;font-size:12px;background:#1e7a3a;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:800">🔄 חשב מחדש</button>`:""}
      </div>
      ${records.length?`<div style="max-height:420px;overflow:auto;border:1px solid #eee;border-radius:8px;margin-bottom:16px">
        <table style="width:100%;border-collapse:collapse;font-size:13px;white-space:nowrap">
          <thead style="position:sticky;top:0;background:#fafafa;z-index:1">
            <tr>
              ${th('name','שם','right')}
              ${th('now','ימי חופש עכשיו')}
              ${th('yearend','ימי חופש בסוף שנה')}
              ${th('throughjan','ימי חופש עד סוף ינואר')}
              ${th('forfeit','ימים לניצול (מעל 3)')}
              <th style="padding:6px 8px;border-bottom:2px solid #eee"></th>
            </tr>
          </thead>
          <tbody>
            ${records.map(r=>{
              const L=live&&live[r.empId];
              const nowH=nowHoursOf(r),yearH=yearEndHoursOf(r),janH=throughJanHoursOf(r),forfH=forfeitHoursOf(r);
              const atRisk=forfH>0;
              const unmatched=live&&!(L&&L.matched);
              const rowBg=nowH<0?'#fff0f0':(atRisk?'#f8f0ff':'#fff');
              const fullName=(r.firstName||'')+' '+(r.lastName||'');
              return `<tr style="background:${rowBg};border-bottom:1px solid #f0f0f0">
                <td style="padding:7px 8px;font-weight:700">${fullName}${unmatched?' <span title="לא מקושר לעובד בסידור" style="color:#c00;font-size:11px">🔗</span>':''}</td>
                <td style="padding:7px 8px;text-align:center;font-weight:800;color:${nowH<0?'#c00':'#1e7a3a'}">${fmtD(nowH)}</td>
                <td style="padding:7px 8px;text-align:center;font-weight:700;color:${yearH<0?'#c00':'#333'}">${fmtD(yearH)}</td>
                <td style="padding:7px 8px;text-align:center;font-weight:700;color:${janH<0?'#c00':'#333'}">${fmtD(janH)}</td>
                <td style="padding:7px 8px;text-align:center;font-weight:800;color:${atRisk?'#6b21a8':'#999'}">${atRisk?fmtD(forfH):'—'}</td>
                <td style="padding:7px 8px;text-align:center"><button onclick="delVacationRecord('${r.empId}','${fullName.replace(/'/g,"\\'")}')" style="background:#fff0f0;border:1px solid #ffb0b0;border-radius:4px;color:#c00;cursor:pointer;padding:2px 7px;font-size:11px">✕</button></td>
              </tr>`;
            }).join('')}
          </tbody>
        </table>
      </div>`:`<div style="text-align:center;padding:24px;color:#888;font-size:13px;border:1px dashed #ddd;border-radius:8px;margin-bottom:16px">אין נתוני חופשה. טען נתוני יוני 2026 או הדבק דוח למטה.</div>`}
      <div style="border-top:1px solid #eee;padding-top:12px">
        <textarea id="vac-paste" rows="5" style="width:100%;padding:8px;font-size:11px;border:1px solid #d0d7e8;border-radius:8px;font-family:monospace;margin-bottom:8px" placeholder="הדבק כאן דוח חדש מפוקוס (מס עובד · שם פרטי · שם משפחה · סוג היעדרות · תאריך · מכסה שנתית · יתרה בתחילת שנה · זכות מצטברת · ניצול מצטבר · שעות לחודש · יתרה חדשה)"></textarea>
        <div style="display:flex;gap:8px;justify-content:flex-end">
          <button class="emp-mgr-cancel" onclick="closeVacationMgr()">סגור</button>
          <button class="emp-mgr-save" onclick="saveVacationImport()">💾 ייבא / עדכן</button>
        </div>
      </div>
    </div>
  </div>`;
}

window.exportBackupJSON = async function(){
  if(!db){ showToast('⚠️ אין חיבור ל-Firebase'); return; }
  showToast('⏳ מייצא נתונים...');
  try {
    const snap = await get(ref(db, '/'));
    const allData = snap.val() || {};
    const now = new Date();
    const fname = `DHL_backup_${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}_${String(now.getHours()).padStart(2,'0')}${String(now.getMinutes()).padStart(2,'0')}.json`;
    const blob = new Blob([JSON.stringify({ _meta: { exportedAt: now.toISOString(), version: 2 }, ...allData }, null, 2)], { type: 'application/json' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = fname;
    a.click();
    URL.revokeObjectURL(a.href);
    localStorage.setItem('dhl_last_backup', Date.now().toString());
    showToast('✅ גיבוי JSON נשמר: ' + fname);
  } catch(e) {
    showToast('❌ שגיאה בייצוא: ' + e.message);
  }
};

window.importBackupJSON = async function(event){
  const file = event.target.files[0];
  if(!file) return;
  if(!confirm(`⚠️ שחזור מגיבוי: "${file.name}"\n\nפעולה זו תדרוס את כל הנתונים הנוכחיים ב-Firebase!\nהאם אתה בטוח?`)) { event.target.value=''; return; }
  showToast('⏳ משחזר נתונים...');
  try {
    const data = JSON.parse(await file.text());
    delete data._meta;
    for(const [key, val] of Object.entries(data)){
      await set(ref(db, key), val);
    }
    showToast('✅ שוחזר בהצלחה! טוען נתונים...');
    setTimeout(() => listenToData(), 1000);
  } catch(e) {
    showToast('❌ שגיאה בשחזור: ' + e.message);
  }
  event.target.value = '';
};

    tableHTML+=`<th style="border:1px solid #ccc;padding:3px 2px;background:${bg};color:${fc};text-align:center;width:28px">${dNames[wd]}<br><span style="font-weight:400">${d}</span></th>`;
  });
  tableHTML+='<th style="border:1px solid #ccc;padding:4px;background:#ebebeb;text-align:center">סה"כ</th>';
  tableHTML+='</tr></thead><tbody>';

  roles.forEach(role=>{
    const rc=ROLE_COLORS_PDF[role]||'#333';
    tableHTML+=`<tr><td colspan="${days.length+2}" style="background:${rc};color:#fff;font-weight:700;font-size:10px;padding:4px 8px">${role}</td></tr>`;
    employees.filter(e=>e.role===role&&(!state.filterEmp||e.name===state.filterEmp)).forEach((emp,ei)=>{
      const rowBg=ei%2===0?'#f9fafd':'#fff';
      let tot=0;
      let cells='';
      days.forEach(({d,wd})=>{
        const isFri=wd===5,isSat=wd===6;
        const k=getShift(emp.name,d);
        const si=shiftInfo(k);
        if(["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(si.key)) tot++;
        const cellBg=isSat?'#fde8e8':isFri?'#FFF3CC':rowBg;
        if(k&&si.label){
          const bg=shiftBgMap[k]||'#eee';
          const tc=shiftTxtMap[k]||'#333';
          cells+=`<td style="border:1px solid #e0e0e0;padding:1px;text-align:center;background:${cellBg}"><div style="background:${bg};color:${tc};border-radius:2px;padding:1px 2px;font-size:8px;font-weight:700">${si.label}</div></td>`;
        } else {
          cells+=`<td style="border:1px solid #e0e0e0;background:${cellBg}"></td>`;
        }
      });
      tableHTML+=`<tr style="background:${rowBg}"><td style="border:1px solid #ddd;padding:3px 6px;text-align:right;font-weight:700;white-space:nowrap">${emp.name}</td><td style="border:1px solid #ddd;padding:3px 4px;text-align:center"><span style="background:${rc};color:#fff;border-radius:2px;padding:1px 4px;font-size:8px;font-weight:700">${role}</span></td>${cells}<td style="border:1px solid #ddd;padding:3px;text-align:center;font-weight:700;color:#D40511">${tot}</td></tr>`;
    });
  });
  tableHTML+='</tbody></table>';

  const printWin=window.open('','_blank','width=1200,height=800');
  printWin.document.write(`<!DOCTYPE html><html dir="rtl"><head>
    <meta charset="UTF-8">
    <title>סידור עבודה DHL — ${monthName} ${state.year}</title>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Heebo:wght@400;700;900&display=swap');
      body{font-family:'Heebo',Arial,sans-serif;direction:rtl;margin:0;padding:16px;background:#fff;color:#222}
      .header{display:flex;align-items:center;gap:16px;margin-bottom:14px;padding-bottom:10px;border-bottom:3px solid #D40511}
      .dhl-logo{background:#FFCC00;padding:6px 14px;border-radius:3px;font-family:Arial Black,Arial;font-weight:900;font-size:28px;color:#D40511;line-height:1}
      h1{font-size:18px;font-weight:900;color:#D40511;margin:0}
      .sub{font-size:12px;color:#888;margin:2px 0 0}
      .footer{margin-top:10px;font-size:10px;color:#aaa;text-align:center}
      @media print{body{padding:8px}@page{margin:8mm;size:A4 landscape}}
    </style>
  </head><body>
    <div class="header">
      <div class="dhl-logo">DHL</div>
      <div>
        <h1>סידור עבודה — ${monthName} ${state.year}</h1>
        <div class="sub">הודפס: ${new Date().toLocaleDateString('he-IL')} ${new Date().toLocaleTimeString('he-IL',{hour:'2-digit',minute:'2-digit'})}</div>
      </div>
    </div>
    ${tableHTML}
    <div class="footer">סידור עבודה DHL — ${monthName} ${state.year} | ${employees.length} עובדים</div>
    <script>setTimeout(()=>window.print(),400);<\/script>
  </body></html>`);
  printWin.document.close();
  showToast('🖨️ הסידור נשלח להדפסה / שמירה כ-PDF');
};
// ===== END PDF EXPORT =====

firebaseConfig=BUILTIN_CONFIG;
initFirebase(BUILTIN_CONFIG);
</script>
