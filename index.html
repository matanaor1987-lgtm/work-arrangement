<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>סידור עבודה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',Arial,sans-serif;direction:rtl;background:#f4f6fa;color:#1a1a2e;min-height:100vh}
.topbar{background:#1F4E79;color:#fff;padding:12px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200;box-shadow:0 2px 8px rgba(0,0,0,0.15);position:relative}
.topbar-title{font-size:17px;font-weight:700}
.topbar-sub{font-size:11px;opacity:0.75;margin-top:1px}
.topbar-right{display:flex;align-items:center;gap:10px}
.mode-btns{display:flex;gap:6px}
.mode-btn{padding:5px 14px;font-size:12px;border:1.5px solid rgba(255,255,255,0.4);border-radius:20px;cursor:pointer;background:transparent;color:#fff;font-family:inherit;transition:all 0.2s}
.mode-btn.active{background:#fff;color:#1F4E79;font-weight:600;border-color:#fff}
.user-pill{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.15);border-radius:20px;padding:4px 10px;font-size:12px}
.user-pill img{width:22px;height:22px;border-radius:50%}
.sign-btn{padding:5px 14px;font-size:12px;border:1.5px solid rgba(255,255,255,0.6);border-radius:20px;cursor:pointer;background:rgba(255,255,255,0.1);color:#fff;font-family:inherit}
.sign-btn:hover{background:rgba(255,255,255,0.2)}
.month-nav{display:flex;align-items:center;gap:10px;padding:10px 20px;background:#fff;border-bottom:1px solid #e5e9f0}
.month-nav button{border:1px solid #d0d7e8;background:#fff;border-radius:8px;padding:4px 12px;cursor:pointer;font-size:14px;color:#1F4E79}
.month-nav button:hover{background:#f0f4fa}
.month-label{font-size:15px;font-weight:600;color:#1a1a2e;flex:1;text-align:center}
.legend{display:flex;gap:10px;padding:8px 20px;flex-wrap:wrap;border-bottom:1px solid #e5e9f0;background:#fff;align-items:center}
.leg{display:flex;align-items:center;gap:5px;font-size:12px;color:#555}
.leg-dot{width:10px;height:10px;border-radius:50%}
.view-tag{padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;background:#e8f0fb;color:#1F4E79;margin-right:auto}
.sync-tag{padding:3px 10px;border-radius:10px;font-size:11px;background:#e6f4ea;color:#1e5c2e;margin-right:4px}
.schedule-wrap{overflow-x:auto;background:#fff;margin:14px;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.07)}
table.sched{border-collapse:collapse;width:100%;font-size:12px}
table.sched th{background:#f0f4fa;padding:6px 3px;text-align:center;border:1px solid #e0e6f0;font-weight:600;color:#555;min-width:38px;white-space:nowrap;position:sticky;top:0;z-index:10}
table.sched th.emp-col{min-width:110px;text-align:right;padding-right:10px;position:sticky;right:0;z-index:20;background:#e8eef8}
table.sched th.role-col{min-width:72px;position:sticky;right:110px;z-index:20;background:#e8eef8}
table.sched td{padding:2px;text-align:center;border:1px solid #eaeff8;height:30px}
table.sched td.emp-col{text-align:right;padding-right:10px;font-weight:600;font-size:12px;position:sticky;right:0;background:#fff;z-index:5;white-space:nowrap}
table.sched td.role-badge{position:sticky;right:110px;z-index:5;background:#fff;padding:2px 5px}
table.sched tr.role-header td{font-weight:700;font-size:12px;color:#fff;padding:5px 10px;text-align:right}
table.sched tr:hover td:not(.emp-col):not(.role-badge){background:#f5f8ff}
.cell-inner{width:100%;height:26px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:600;cursor:pointer;transition:opacity 0.15s}
.cell-inner:hover{opacity:0.75}
.cell-empty-btn{color:#bbc;font-size:18px;background:transparent;width:100%;height:26px;display:flex;align-items:center;justify-content:center;cursor:pointer}
.sh-a{background:#fff6cc;color:#7a5c00}
.sh-b{background:#e6f4ea;color:#1e5c2e}
.sh-c{background:#fce8dc;color:#7a2e00}
.sh-off{background:#f0e8fc;color:#5c2e8a}
.sh-mil{background:#daeaf8;color:#1a4a70}
.sh-sab{background:#fce4ec;color:#880e4f}
.sh-sick{background:#ffe0b2;color:#bf360c}
.sh-hv{background:#e8eaf6;color:#283593}
.sh-low{background:#e0f2f1;color:#004d40}
.sh-flight{background:#e1f5fe;color:#01579b}
.sh-report{background:#f3e5f5;color:#4a148c}
.sh-d{background:#fff9c4;color:#6d4c00}
.sh-e{background:#dcedc8;color:#1b5e20}
.sh-f{background:#ffe0b2;color:#6d1f00}
.sh-motz{background:#e8eaf6;color:#1a237e}
.sh-audit{background:#fce4ec;color:#6a1b4d}
.note-bar{display:flex;gap:8px;align-items:center;padding:8px 20px;background:#fffbea;border-bottom:1px solid #f0e8b0;flex-wrap:wrap;font-size:13px;color:#7a5c00}
.note-bar select,.note-bar input{padding:5px 10px;font-size:12px;border:1px solid #d0c080;border-radius:8px;background:#fff;color:#333;font-family:inherit}
.note-bar input{flex:1;min-width:180px}
.note-bar button{padding:5px 14px;font-size:12px;border:1px solid #c0a020;border-radius:8px;cursor:pointer;background:#fff8dc;color:#7a5c00;font-family:inherit}
.summary-section{margin:0 14px 20px;background:#fff;border-radius:12px;box-shadow:0 1px 6px rgba(0,0,0,0.07);overflow:hidden}
.summary-section h2{font-size:14px;font-weight:600;padding:12px 16px;border-bottom:1px solid #e5e9f0;color:#1F4E79}
.sum-cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:10px;padding:14px 16px}
.sum-card{background:#f4f6fa;border-radius:10px;padding:12px;text-align:center}
.sum-card .val{font-size:26px;font-weight:700;color:#1F4E79}
.sum-card .lbl{font-size:11px;color:#888;margin-top:2px}
.emp-sum-table{width:100%;border-collapse:collapse;font-size:12px;margin:0 0 16px}
.emp-sum-table th{background:#f0f4fa;padding:7px 8px;text-align:center;border:1px solid #e0e6f0;font-weight:600;color:#555;font-size:11px}
.emp-sum-table th:first-child{text-align:right}
.emp-sum-table td{padding:6px 8px;border:1px solid #eaeff8;text-align:center;vertical-align:middle}
.emp-sum-table td:first-child{text-align:right;font-weight:600}
.emp-sum-table tr:nth-child(even){background:#f9fafd}
.week-bar-wrap{display:flex;align-items:center;gap:4px}
.week-bar{height:12px;border-radius:3px;min-width:4px}
.role-pill{display:inline-block;padding:1px 6px;border-radius:8px;font-size:10px;font-weight:600;color:#fff}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,0.35);z-index:998}
.popup{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#fff;border-radius:14px;padding:20px;z-index:999;min-width:260px;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.popup h3{font-size:15px;font-weight:700;margin-bottom:14px;color:#1a1a2e}
.popup-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.shift-opt{padding:10px;border:1.5px solid #e0e6f0;border-radius:9px;cursor:pointer;text-align:center;font-size:12px;font-weight:600;transition:all 0.15s}
.shift-opt:hover{border-color:#1F4E79}
.shift-opt.selected{border-color:#1F4E79;border-width:2px;box-shadow:0 0 0 3px rgba(31,78,121,0.1)}
.popup-actions{display:flex;gap:8px;justify-content:flex-end}
.popup-actions button{padding:7px 18px;font-size:13px;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;background:#fff;color:#333;font-family:inherit;font-weight:500}
.btn-save{background:#1F4E79 !important;color:#fff !important;border-color:#1F4E79 !important}
.setup-box{max-width:520px;margin:40px auto;background:#fff;border-radius:14px;padding:28px;box-shadow:0 2px 16px rgba(0,0,0,0.1)}
.setup-box h2{font-size:18px;font-weight:700;margin-bottom:8px;color:#1F4E79}
.setup-box p{font-size:13px;color:#555;margin-bottom:18px;line-height:1.6}
.setup-box input{width:100%;padding:9px 12px;font-size:13px;border:1px solid #d0d7e8;border-radius:8px;margin-bottom:10px;font-family:inherit}
.setup-box button{width:100%;padding:10px;font-size:14px;font-weight:600;background:#1F4E79;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit}
.setup-box button:hover{background:#163d60}
.setup-step{display:flex;gap:10px;margin-bottom:12px;font-size:12px;color:#444;align-items:flex-start;line-height:1.5}
.step-num{min-width:22px;height:22px;border-radius:50%;background:#1F4E79;color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:11px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#1F4E79;color:#fff;padding:10px 22px;border-radius:20px;font-size:13px;z-index:9999;opacity:0;transition:opacity 0.3s}
.toast.show{opacity:1}
.day-note-mark{font-size:9px;color:#7a5c00}
@media(max-width:600px){
  .topbar{padding:10px 12px}
  .schedule-wrap,.summary-section{margin:8px}
}

.emp-mgr{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:999;display:flex;align-items:center;justify-content:center}
.emp-mgr-box{background:#fff;border-radius:14px;padding:20px;width:520px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.emp-mgr-box h2{font-size:16px;font-weight:700;margin-bottom:14px;color:#1F4E79}
.emp-mgr-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr 36px;gap:6px;margin-bottom:6px;align-items:center}
.emp-mgr-row input,.emp-mgr-row select{padding:6px 8px;font-size:12px;border:1px solid #d0d7e8;border-radius:7px;font-family:inherit}
.emp-mgr-del{background:#fff0f0;border:1px solid #ffb0b0;border-radius:7px;cursor:pointer;font-size:14px;color:#c00;padding:4px}
.emp-mgr-add{padding:7px 14px;font-size:12px;background:#e8f4ea;color:#1e5c2e;border:1px solid #b0d8b8;border-radius:8px;cursor:pointer;font-family:inherit;margin-left:6px}
.emp-mgr-save{padding:7px 18px;font-size:13px;background:#1F4E79;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.emp-mgr-cancel{padding:7px 14px;font-size:13px;background:#fff;color:#333;border:1px solid #d0d7e8;border-radius:8px;cursor:pointer;font-family:inherit}
.emp-mgr-roles{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.role-hdr{font-size:12px;font-weight:700;color:#fff;padding:3px 10px;border-radius:10px;margin:8px 0 4px}

.req-btn{position:fixed;bottom:24px;left:24px;z-index:500;background:#1F4E79;color:#fff;border:none;border-radius:50px;padding:12px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.2)}
.req-btn:hover{background:#163d60}
.bell-btn{position:relative;display:inline-flex;align-items:center;gap:6px;padding:5px 14px;font-size:12px;border:1.5px solid rgba(255,255,255,0.4);border-radius:20px;cursor:pointer;background:transparent;color:#fff;font-family:inherit}
.bell-badge{position:absolute;top:-6px;right:-6px;background:#e53935;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center}
.req-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.req-box{background:#fff;border-radius:14px;padding:24px;width:500px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.req-box h2{font-size:16px;font-weight:700;margin-bottom:16px;color:#1F4E79}
.req-form label{font-size:12px;color:#555;display:block;margin-bottom:3px;margin-top:10px}
.req-form select,.req-form input,.req-form textarea{width:100%;padding:8px 10px;font-size:13px;border:1px solid #d0d7e8;border-radius:8px;font-family:inherit}
.req-form textarea{resize:vertical;min-height:70px}
.req-card{border:1px solid #e5e9f0;border-radius:10px;padding:12px 14px;margin-bottom:10px;background:#fafbff}
.req-card .req-meta{font-size:11px;color:#888;margin-bottom:4px}
.req-card .req-name{font-size:13px;font-weight:600;color:#1a1a2e;margin-bottom:2px}
.req-card .req-type{display:inline-block;padding:2px 8px;border-radius:8px;font-size:11px;font-weight:600;background:#e8f0fb;color:#1F4E79;margin-bottom:6px}
.req-card .req-note{font-size:12px;color:#555;margin-top:4px}
.status-pending{color:#f57c00;font-weight:600;font-size:11px}
.status-approved{color:#2e7d32;font-weight:600;font-size:11px}
.status-rejected{color:#c62828;font-weight:600;font-size:11px}
.req-actions{display:flex;gap:6px;margin-top:10px}
.btn-approve{padding:5px 14px;font-size:12px;background:#e8f4ea;color:#2e7d32;border:1px solid #b0d8b8;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.btn-reject{padding:5px 14px;font-size:12px;background:#fff0f0;color:#c62828;border:1px solid #ffb0b0;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.admin-note-inp{width:100%;padding:5px 8px;font-size:11px;border:1px solid #d0d7e8;border-radius:6px;font-family:inherit;margin-top:4px}
.emp-req-card{border:1px solid #e5e9f0;border-radius:10px;padding:12px;margin-bottom:8px}
.notif-banner{position:fixed;top:70px;left:50%;transform:translateX(-50%);background:#1F4E79;color:#fff;padding:12px 24px;border-radius:10px;font-size:13px;font-weight:600;z-index:2000;box-shadow:0 4px 20px rgba(0,0,0,0.2);animation:slideDown 0.3s ease}
@keyframes slideDown{from{top:50px;opacity:0}to{top:70px;opacity:1}}

.team-msg-banner{background:#1F4E79;color:#fff;padding:10px 20px;text-align:center;font-size:13px;font-weight:500;display:flex;align-items:center;justify-content:center;gap:10px}
.team-msg-banner button{background:rgba(255,255,255,0.2);border:1px solid rgba(255,255,255,0.4);color:#fff;border-radius:6px;padding:3px 10px;font-size:12px;cursor:pointer;font-family:inherit}
.msg-editor{display:flex;gap:8px;padding:8px 16px;background:#e8f0fb;border-bottom:1px solid #d0d7e8;align-items:center}
.msg-editor input{flex:1;padding:7px 10px;font-size:13px;border:1px solid #d0d7e8;border-radius:8px;font-family:inherit}
.msg-editor button{padding:7px 14px;font-size:12px;background:#1F4E79;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-weight:600}
.msg-editor .clear-btn{background:#fff0f0;color:#c00;border:1px solid #ffb0b0}
.personal-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.personal-box{background:#fff;border-radius:14px;padding:24px;width:480px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.personal-box h2{font-size:16px;font-weight:700;margin-bottom:16px;color:#1F4E79}
.my-shift-card{border-radius:10px;padding:10px 14px;margin-bottom:8px;display:flex;align-items:center;justify-content:space-between}
.copy-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);z-index:1000;display:flex;align-items:center;justify-content:center}
.copy-box{background:#fff;border-radius:14px;padding:24px;width:400px;box-shadow:0 8px 40px rgba(0,0,0,0.2)}
.copy-box h2{font-size:16px;font-weight:700;margin-bottom:16px;color:#1F4E79}
</style>
</head>
<body>
<div id="app"><div style="text-align:center;padding:60px;color:#888">טוען...</div></div>
<div class="toast" id="toast"></div>

<script type="module">
import{initializeApp}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getDatabase,ref,set,onValue,get}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const EMPLOYEES=[
  {role:"מסווג",name:"אייל"},{role:"מסווג",name:"סתיו"},{role:"מסווג",name:"אבבה"},
  {role:"מסווג",name:"מזל"},{role:"מסווג",name:"ליאור"},{role:"מסווג",name:"ניר"},
  {role:"מסווג",name:"רועי"},{role:"מסווג",name:"ייטב"},{role:"מסווג",name:"חגי"},{role:"מסווג",name:"גיא"},
  {role:"בקרה",name:"איילה"},{role:"בקרה",name:"ראם"},
  {role:"אישורים",name:"מירית"},{role:"אישורים",name:"דלית"},
  {role:"פקידי רישוי",name:"עידן"},{role:"פקידי רישוי",name:"חיים"},
  {role:"פקידי רישוי",name:"שניר"},{role:"פקידי רישוי",name:"צאלה"},{role:"פקידי רישוי",name:"אור"},
  {role:"רפרנטיות",name:"אהובה"},{role:"רפרנטיות",name:"אילנה"}
];
const ROLE_COLORS={"מסווג":"#1F4E79","בקרה":"#375623","אישורים":"#833C00","פקידי רישוי":"#7030A0","רפרנטיות":"#C00000"};
const SHIFTS=[
  {key:"A",label:"08-17",cls:"sh-a"},
  {key:"B",label:"07-16",cls:"sh-b"},
  {key:"C",label:"06-15",cls:"sh-c"},
  {key:"D",label:"08-16",cls:"sh-d"},
  {key:"E",label:"07-15",cls:"sh-e"},
  {key:"F",label:"06-14",cls:"sh-f"},
  {key:"SAB",label:"סבב",cls:"sh-sab"},
  {key:"MOTZ",label:"מוצש",cls:"sh-motz"},
  {key:"AUDIT",label:"ביקורת",cls:"sh-audit"},
  {key:"OFF",label:"חופש",cls:"sh-off"},
  {key:"MIL",label:"מיל'",cls:"sh-mil"},
  {key:"SICK",label:"מחלה",cls:"sh-sick"},
  {key:"HV",label:"HV",cls:"sh-hv"},
  {key:"LOW",label:"LOW",cls:"sh-low"},
  {key:"FLIGHT",label:"פותח טיסות",cls:"sh-flight"},
  {key:"REPORT",label:"דוחות",cls:"sh-report"},
  {key:"",label:"ריק",cls:""}
];
const MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const DAY_NAMES=["א","ב","ג","ד","ה","ו","ש"];
const DAY_NAMES_FULL=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

const ADMIN_PASSWORD='DHL123';
let firebaseConfig=null;
let app,auth,db;
let EMPLOYEES_DEFAULT=[{role:"מסווג",name:"אייל"},{role:"מסווג",name:"סתיו"},{role:"מסווג",name:"אבבה"},{role:"מסווג",name:"מזל"},{role:"מסווג",name:"ליאור"},{role:"מסווג",name:"ניר"},{role:"מסווג",name:"רועי"},{role:"מסווג",name:"ייטב"},{role:"מסווג",name:"חגי"},{role:"מסווג",name:"גיא"},{role:"בקרה",name:"איילה"},{role:"בקרה",name:"ראם"},{role:"אישורים",name:"מירית"},{role:"אישורים",name:"דלית"},{role:"פקידי רישוי",name:"עידן"},{role:"פקידי רישוי",name:"חיים"},{role:"פקידי רישוי",name:"שניר"},{role:"פקידי רישוי",name:"צאלה"},{role:"פקידי רישוי",name:"אור"},{role:"רפרנטיות",name:"אהובה"},{role:"רפרנטיות",name:"אילנה"}];
let employees=JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT));
let state={mode:"view",year:2026,month:4,schedule:{},notes:{},cellNotes:{},popup:null,noteDay:1,user:null,adminUid:null,configured:false,showEmpMgr:false,teamMsg:'',showPersonal:false,personalEmp:'',showPwdForm:false};

function loadConfig(){
  try{const c=localStorage.getItem("seder_fb_config");if(c){firebaseConfig=JSON.parse(c);return true;}}catch(e){}
  return false;
}
function saveConfig(cfg){localStorage.setItem("seder_fb_config",JSON.stringify(cfg));localStorage.setItem("seder_admin_uid","pending");}

function initFirebase(cfg){
  try{
    app=initializeApp(cfg);
    auth=getAuth(app);
    db=getDatabase(app);
    state.configured=true;
    onAuthStateChanged(auth,user=>{
      state.user=user;
      if(user){
        // Save admin UID to Firebase on first login
        get(ref(db,"adminUid")).then(snap=>{
          if(!snap.val()){
            set(ref(db,"adminUid"),user.uid);
            state.adminUid=user.uid;
          } else {
            state.adminUid=snap.val();
          }
          state.mode=user.uid===state.adminUid?"admin":"view";
          if(state.mode==="admin"&&state.adminUid==="password-admin") state.mode="admin";
          render();
        });
      } else {
        state.mode="view";
      }
      listenToData();
      render();
    });
  }catch(e){alert("שגיאה בהתחברות ל-Firebase. בדוק את ההגדרות.");state.configured=false;render();}
}

function buildDefaultSchedule(){
  const n=daysInMonth(state.year,state.month);
  const sched={};
  for(let d=1;d<=n;d++){
    const wd=ilWD(state.year,state.month,d);
    if(wd>=0&&wd<=4){employees.forEach(emp=>{sched[emp.name+"|"+d]="A";});}
  }
  return sched;
}
function listenToData(){
  if(!db)return;
  // Load employees list
  onValue(ref(db,'employees'),(snap)=>{
    const data=snap.val();
    if(data&&Array.isArray(data)&&data.length>0){employees=data;}
    else{employees=JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT));}
  });
  listenToRequests();
  onValue(ref(db,'teamMessage'),(snap)=>{
    state.teamMsg=snap.val()||'';
    render();
  });
  const key=`seder_${state.year}_${state.month}`;
  onValue(ref(db,key),(snap)=>{
    const data=snap.val()||{};
    if(!data.schedule||Object.keys(data.schedule).length===0){
      state.schedule=buildDefaultSchedule();
    } else {
      state.schedule=data.schedule;
    }
    state.notes=data.notes||{};
    state.cellNotes=data.cellNotes||{};
    render();
  });
}

function saveToCloud(){
  if(!db)return;
  const key=`seder_${state.year}_${state.month}`;
  set(ref(db,key),{schedule:state.schedule,notes:state.notes,cellNotes:state.cellNotes||{}});
}
function saveEmployeesToCloud(){
  if(!db)return;
  set(ref(db,'employees'),employees);
  showToast("✓ רשימת עובדים נשמרה");
}

function ilWD(y,m,d){return new Date(y,m,d).getDay();}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getDays(){const n=daysInMonth(state.year,state.month);return Array.from({length:n},(_,i)=>({d:i+1,wd:ilWD(state.year,state.month,i+1)}));}
function getShift(emp,d){return state.schedule[emp+"|"+d]||"";}
function setShift(emp,d,v){state.schedule[emp+"|"+d]=v;}
function shiftInfo(k){return SHIFTS.find(s=>s.key===k)||SHIFTS[SHIFTS.length-1];}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function getWeekIndex(d){
  // Returns 0-based week index for a given day number
  const firstWD=ilWD(state.year,state.month,0);
  // day d (1-based), find which week it falls in
  const dayIdx=d-1;
  const adjustedIdx=dayIdx+firstWD;
  return Math.floor(adjustedIdx/7);
}

];

window.executeCopy=function(){
  const toMonth=parseInt(document.getElementById('copy-to-month').value);
  const toYear=parseInt(document.getElementById('copy-to-year').value);
  if(isNaN(toMonth)||isNaN(toYear)){alert('בחר חודש ושנה');return;}
  if(toMonth===state.month&&toYear===state.year){alert('לא ניתן להעתיק לאותו חודש');return;}
  if(!confirm(`להעתיק את הסידור ל-${MONTHS[toMonth]} ${toYear}? פעולה זו תדרוס סידור קיים!`)) return;
  const newKey=`seder_${toYear}_${toMonth}`;
  const newSched={};
  // Copy schedule adjusting day numbers that exist in target month
  const targetDays=new Date(toYear,toMonth+1,0).getDate();
  Object.entries(state.schedule).forEach(([k,v])=>{
    const [emp,d]=k.split('|');
    if(parseInt(d)<=targetDays) newSched[k]=v;
  });
  set(ref(db,newKey),{schedule:newSched,notes:{},cellNotes:{}});
  showToast(`✓ הסידור הועתק ל-${MONTHS[toMonth]} ${toYear}!`);
  state.showCopy=false;
  render();
};

window.handleRequest=function(id,status){
  const noteEl=document.getElementById('note-'+id);
  const adminNote=noteEl?noteEl.value:'';
  set(ref(db,'requests/'+id+'/status'),status);
  set(ref(db,'requests/'+id+'/adminNote'),adminNote);
  set(ref(db,'requests/'+id+'/seen'),false);
  showToast(status==='approved'?'✅ הבקשה אושרה':'❌ הבקשה נדחתה');
  // WhatsApp notification
  const req=(window._allRequests||[]).find(r=>r.id===id);
  if(req){
    const phone=getEmpPhone(req.empName);
    if(phone){
      if(confirm(`לשלוח הודעת WhatsApp ל${req.empName} על ${status==='approved'?'אישור':'דחיית'} הבקשה?`)){
        window.sendRequestWhatsApp(req.empName,phone,status,req.type,req.date);
      }
    }
  }
  render();
};

function getEmpPhone(empName){
  const emp=employees.find(e=>e.name===empName);
  return emp&&emp.phone?emp.phone.replace(/\D/g,''):'';
}
function sendWhatsApp(phone,msg){
  if(!phone){showToast('⚠️ אין מספר טלפון לעובד זה');return;}
  // Convert Israeli number to international format
  let intl=phone;
  if(intl.startsWith('0'))intl='972'+intl.slice(1);
  const url='https://wa.me/'+intl+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}

  if(!pwd) return;
  if(pwd.value===ADMIN_PASSWORD){
    state.mode='admin';
    state.adminUid='password-admin';
    showToast('✓ נכנסת כמנהל');
    render();
  } else {
    alert('סיסמה שגויה');
  }
};
window.togglePwdForm=function(){
  state.showPwdForm=!state.showPwdForm;
  render();
};
window.doSignOut=async function(){
  if(state.adminUid==='password-admin'){
    state.mode='view';state.adminUid=null;state.user=null;
    render();return;
  }
  await signOut(auth);
};
window.switchMode=function(m){state.mode=m;render();};
window.changeMonth=function(d){
  state.month+=d;
  if(state.month<0){state.month=11;state.year--;}
  if(state.month>11){state.month=0;state.year++;}
  listenToData();
};
window.openPopup=function(emp,d){state.popup={emp,d,sel:getShift(emp,d),noteVal:getCellNote(emp,d)};render();};
window.closePopup=function(){state.popup=null;render();};
window._pickShift=function(k){if(state.popup){state.popup.sel=k;render();}};
window._liveNoteCell=function(v){if(state.popup){state.popup.noteVal=v;}};
window._confirmShift=function(){
  if(state.popup){
    const empName=state.popup.emp;
    const d=state.popup.d;
    const sel=state.popup.sel;
    setShift(empName,d,sel);
    const noteV=document.getElementById("cell-note-inp")?document.getElementById("cell-note-inp").value:state.popup.noteVal||"";
    setCellNote(empName,d,noteV);
    saveToCloud();showToast("✓ נשמר בענן");
    state.popup=null;render();
    // WhatsApp notification
    const phone=getEmpPhone(empName);
    if(phone&&sel){
      const si=shiftInfo(sel);
      if(confirm(`לשלוח הודעת WhatsApp ל${empName} על שינוי המשמרת?`)){
        window.sendShiftWhatsApp(empName,d,si.label);
      }
    }
  }
};
window.selectNoteDay=function(v){state.noteDay=parseInt(v);render();};
window.liveNote=function(v){state.notes[state.year+"-"+state.month+"-"+state.noteDay]=v;};
window.saveNote=function(){
  liveNote(document.getElementById("note-inp").value);
  saveToCloud();showToast("✓ הערה נשמרה");render();
};
