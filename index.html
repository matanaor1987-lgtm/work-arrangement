<script>
// Generate DHL icon as canvas and set as apple-touch-icon
window.addEventListener('load',function(){
  try{
    const c=document.createElement('canvas');
    c.width=192;c.height=192;
    const ctx=c.getContext('2d');
    // Red background
    ctx.fillStyle='#D40511';
    ctx.fillRect(0,0,192,192);
    // Yellow rounded rect for logo bg
    ctx.fillStyle='#FFCC00';
    ctx.beginPath();
    ctx.roundRect(16,40,160,80,12);
    ctx.fill();
    // DHL text
    ctx.fillStyle='#D40511';
    ctx.font='bold 62px Arial Black,Arial';
    ctx.textAlign='center';
    ctx.fillText('DHL',96,108);
    // "סידור" text
    ctx.fillStyle='#FFCC00';
    ctx.font='bold 28px Arial';
    ctx.fillText('סידור עבודה',96,160);
    // Set as icon
    const link=document.createElement('link');
    link.rel='apple-touch-icon';
    link.href=c.toDataURL();
    document.head.appendChild(link);
    const link2=document.createElement('link');
    link2.rel='icon';
    link2.href=c.toDataURL();
    document.head.appendChild(link2);
  }catch(e){}
});
</script>

import{getAuth,GoogleAuthProvider,signInWithPopup,signOut,onAuthStateChanged}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import{getDatabase,ref,set,onValue,get}from'https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js';

const EMPLOYEES=[
  {role:"מסווג",name:"אייל"},{role:"מסווג",name:"סתיו"},{role:"מסווג",name:"אבבה"},
  {role:"מסווג",name:"מזל"},{role:"מסווג",name:"ליאור"},{role:"מסווג",name:"ניר"},
  {role:"מסווג",name:"רועי"},{role:"מסווג",name:"ייטב"},{role:"מסווג",name:"חגי"},{role:"מסווג",name:"גיא"},
  {role:"בקרה",name:"איילה"},{role:"בקרה",name:"ראם"},
  {role:"אישורים",name:"מירית"},{role:"אישורים",name:"דלית"},
  {role:"פקידי רישוי",name:"עידן"},{role:"פקידי רישוי",name:"חיים"},
  {role:"פקידי רישוי",name:"שניר"},{role:"פקידי רישוי",name:"צאלה"},{role:"פקידי רישוי",name:"אור"},
  {role:"רפרנטיות",name:"אהובה"},{role:"רפרנטיות",name:"אילנה"}
];
const ROLE_COLORS={"מסווג":"#D40511","בקרה":"#375623","אישורים":"#833C00","פקידי רישוי":"#7030A0","רפרנטיות":"#C00000"};
const SHIFTS=[
  {key:"A",label:"08-17",cls:"sh-a"},
  {key:"B",label:"07-16",cls:"sh-b"},
  {key:"C",label:"06-15",cls:"sh-c"},
  {key:"D",label:"08-16",cls:"sh-d"},
  {key:"E",label:"07-15",cls:"sh-e"},
  {key:"F",label:"06-14",cls:"sh-f"},
  {key:"G",label:"08-13",cls:"sh-g"},
  {key:"SAB",label:"סבב",cls:"sh-sab"},
  {key:"MOTZ",label:"מוצש",cls:"sh-motz"},
  {key:"AUDIT",label:"ביקורת",cls:"sh-audit"},
  {key:"OFF",label:"חופש",cls:"sh-off"},
  {key:"MIL",label:"מיל'",cls:"sh-mil"},
  {key:"SICK",label:"מחלה",cls:"sh-sick"},
  {key:"HV",label:"HV",cls:"sh-hv"},
  {key:"LOW",label:"LOW",cls:"sh-low"},
  {key:"FLIGHT",label:"פותח טיסות",cls:"sh-flight"},
  {key:"REPORT",label:"דוחות",cls:"sh-report"},
  {key:"",label:"ריק",cls:""}
];
const MONTHS=["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
const DAY_NAMES=["א","ב","ג","ד","ה","ו","ש"];
const DAY_NAMES_FULL=["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];

const ADMIN_PASSWORD='DHL123';
let firebaseConfig=null;
let app,auth,db;
let EMPLOYEES_DEFAULT=[{role:"מסווג",name:"אייל"},{role:"מסווג",name:"סתיו"},{role:"מסווג",name:"אבבה"},{role:"מסווג",name:"מזל"},{role:"מסווג",name:"ליאור"},{role:"מסווג",name:"ניר"},{role:"מסווג",name:"רועי"},{role:"מסווג",name:"ייטב"},{role:"מסווג",name:"חגי"},{role:"מסווג",name:"גיא"},{role:"בקרה",name:"איילה"},{role:"בקרה",name:"ראם"},{role:"אישורים",name:"מירית"},{role:"אישורים",name:"דלית"},{role:"פקידי רישוי",name:"עידן"},{role:"פקידי רישוי",name:"חיים"},{role:"פקידי רישוי",name:"שניר"},{role:"פקידי רישוי",name:"צאלה"},{role:"פקידי רישוי",name:"אור"},{role:"רפרנטיות",name:"אהובה"},{role:"רפרנטיות",name:"אילנה"}];
let employees=JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT));
let state={mode:"view",year:2026,month:4,schedule:{},notes:{},cellNotes:{},popup:null,noteDay:1,user:null,adminUid:null,configured:false,showEmpMgr:false,teamMsg:'',showPersonal:false,personalEmp:'',showPwdForm:false,waNotif:false,weekView:false,weekOffset:0,empView:false,empViewMode:'week'};

window.toggleWaNotif=function(){
  state.waNotif=!state.waNotif;
  showToast(state.waNotif?'📱 התראות WhatsApp פעילות':'📱 התראות WhatsApp כבויות');
  render();
};

window.toggleWeekView=function(){
  state.weekView=!state.weekView;
  if(state.weekView){
    // Set week offset to show current week
    const today=new Date();
    const todayDay=today.getDate();
    const todayMonth=today.getMonth();
    const todayYear=today.getFullYear();
    if(todayMonth===state.month&&todayYear===state.year){
      // Find which week today is in
      const days=getDays();
      let weekNum=0,wCur=[];
      days.forEach(({d,wd})=>{
        if(wd===0&&wCur.length){weekNum++;wCur=[];}
        wCur.push(d);
        if(d===todayDay) state.weekOffset=weekNum;
      });
    } else {
      state.weekOffset=0;
    }
  }
  render();
};
window.changeWeek=function(dir){
  const weeks=getWeeks();
  state.weekOffset=Math.max(0,Math.min(weeks.length-1,state.weekOffset+dir));
  render();
};

function loadConfig(){
  try{const c=localStorage.getItem("seder_fb_config");if(c){firebaseConfig=JSON.parse(c);return true;}}catch(e){}
  return false;
}
function saveConfig(cfg){localStorage.setItem("seder_fb_config",JSON.stringify(cfg));localStorage.setItem("seder_admin_uid","pending");}

function initFirebase(cfg){
  try{
    app=initializeApp(cfg);
    auth=getAuth(app);
    db=getDatabase(app);
    state.configured=true;
    onAuthStateChanged(auth,user=>{
      state.user=user;
      if(user){
        // Save admin UID to Firebase on first login
        get(ref(db,"adminUid")).then(snap=>{
          if(!snap.val()){
            set(ref(db,"adminUid"),user.uid);
            state.adminUid=user.uid;
          } else {
            state.adminUid=snap.val();
          }
          state.mode=user.uid===state.adminUid?"admin":"view";
          if(state.mode==="admin"&&state.adminUid==="password-admin") state.mode="admin";
          render();
        });
      } else {
        state.mode="view";
      }
      listenToData();
      render();
    });
  }catch(e){alert("שגיאה בהתחברות ל-Firebase. בדוק את ההגדרות.");state.configured=false;render();}
}

function buildDefaultSchedule(){
  const n=daysInMonth(state.year,state.month);
  const sched={};
  for(let d=1;d<=n;d++){
    const wd=ilWD(state.year,state.month,d);
    if(wd>=0&&wd<=4){employees.forEach(emp=>{sched[emp.name+"|"+d]="A";});}
  }
  return sched;
}
function listenToData(){
  if(!db)return;
  // Load employees list
  onValue(ref(db,'employees'),(snap)=>{
    const data=snap.val();
    if(data&&Array.isArray(data)&&data.length>0){employees=data;}
    else{employees=JSON.parse(JSON.stringify(EMPLOYEES_DEFAULT));}
  });
  listenToRequests();
  onValue(ref(db,'teamMsg'),(snap)=>{
    state.teamMsg=snap.val()||'';
    render();
  });
  const key=`seder_${state.year}_${state.month}`;
  onValue(ref(db,key),(snap)=>{
    const data=snap.val()||{};
    if(!data.schedule||Object.keys(data.schedule).length===0){
      state.schedule=buildDefaultSchedule();
    } else {
      state.schedule=data.schedule;
    }
    state.notes=data.notes||{};
    state.cellNotes=data.cellNotes||{};
    render();
  });
}

function saveToCloud(){
  if(!db)return;
  const key=`seder_${state.year}_${state.month}`;
  set(ref(db,key),{schedule:state.schedule,notes:state.notes,cellNotes:state.cellNotes||{}});
}
function saveEmployeesToCloud(){
  if(!db)return;
  set(ref(db,'employees'),employees);
  showToast("✓ רשימת עובדים נשמרה");
}

function ilWD(y,m,d){return new Date(y,m,d).getDay();}
function daysInMonth(y,m){return new Date(y,m+1,0).getDate();}
function getDays(){const n=daysInMonth(state.year,state.month);return Array.from({length:n},(_,i)=>({d:i+1,wd:ilWD(state.year,state.month,i+1)}));}

function getWeeks(){
  const days=getDays();
  const weeks=[];let cur=[];
  days.forEach(({d,wd})=>{
    if(wd===0&&cur.length){weeks.push(cur);cur=[];}
    cur.push({d,wd});
  });
  if(cur.length)weeks.push(cur);
  return weeks;
}

function buildWeekView(isAdmin){
  const weeks=getWeeks();
  const wi=Math.min(state.weekOffset,weeks.length-1);
  const week=weeks[wi]||[];
  const DAYS_FULL=['א׳','ב׳','ג׳','ד׳','ה׳','ו׳','ש׳'];
  const today=new Date();
  const showEmps=state.personalEmp&&!isAdmin?employees.filter(e=>e.name===state.personalEmp):employees;
  const roles=[...new Set(showEmps.map(e=>e.role))];

  return `<div class="week-view-wrap">
    <div class="week-view-header">
      <div class="week-view-title">שבוע ${wi+1} — ${MONTHS[state.month]} ${state.year}</div>
      <div class="week-view-nav">
        <button onclick="changeWeek(-1)" ${wi===0?'disabled style="opacity:0.3"':''}>&#8592;</button>
        <span style="font-size:12px;color:#888">${wi+1}/${weeks.length}</span>
        <button onclick="changeWeek(1)" ${wi===weeks.length-1?'disabled style="opacity:0.3"':''}>&#8594;</button>
      </div>
    </div>
    <div style="overflow-x:auto;background:#fff;border:1px solid var(--dhl-border);border-top:none;border-radius:0 0 4px 4px">
      <table style="border-collapse:collapse;width:100%;font-size:12px;min-width:320px">
        <thead>
          <tr style="background:#f5f5f5">
            <th style="padding:8px 10px;text-align:right;border:1px solid #e0e0e0;font-weight:800;color:#555;min-width:80px;position:sticky;right:0;background:#f0f0f0;z-index:5">עובד</th>
            ${week.map(({d,wd})=>{
              const isToday=today.getDate()===d&&today.getMonth()===state.month&&today.getFullYear()===state.year;
              const isSab=wd===6;
              const isFri=wd===5;
              const bg=isToday?'var(--dhl-yellow)':isSab?'#fde8e8':isFri?'#FFF3CC':'#f5f5f5';
              const tc=isToday?'var(--dhl-red)':'#555';
              return `<th style="padding:6px 4px;text-align:center;border:1px solid #e0e0e0;font-weight:800;color:${tc};background:${bg};min-width:52px">
                <div style="font-size:13px">${d}</div>
                <div style="font-size:10px;font-weight:600">${DAYS_FULL[wd]}</div>
              </th>`;
            }).join('')}
          </tr>
        </thead>
        <tbody>
          ${roles.map(role=>{
            const roleEmps=showEmps.filter(e=>e.role===role);
            const rc=ROLE_COLORS[role]||'#888';
            return `
              <tr>
                <td colspan="${week.length+1}" style="background:${rc};color:#fff;font-size:11px;font-weight:800;padding:4px 10px;border:1px solid rgba(0,0,0,0.1)">${role}</td>
              </tr>
              ${roleEmps.map(emp=>{
                return `<tr style="border-bottom:1px solid #f0f0f0">
                  <td style="padding:6px 10px;font-weight:700;font-size:12px;border:1px solid #ebebeb;position:sticky;right:0;background:#fff;z-index:4;white-space:nowrap">${emp.name}</td>
                  ${week.map(({d,wd})=>{
                    const sh=getShift(emp.name,d);
                    const si=shiftInfo(sh);
                    const isSab=wd===6;
                    const isFri=wd===5;
                    const cn=state.cellNotes[emp.name+'|'+state.year+'-'+state.month+'-'+d]||'';
                    const bgCell=isSab?'background:#fde8e8':isFri?'background:#fffbea':'';
                    if(si.key){
                      return `<td style="padding:4px;text-align:center;border:1px solid #ebebeb;${bgCell}">
                        <div class="cell-inner ${si.cls}" style="height:32px;border-radius:3px;font-size:11px;font-weight:700" ${isAdmin?`onclick="openPopup('${emp.name.replace(/'/g,"\\'")}',${d})"`:''} title="${cn?cn:si.label}">
                          ${si.label}
                          ${cn?`<span style="display:block;font-size:8px;opacity:0.8">📝</span>`:''}
                        </div>
                      </td>`;
                    } else {
                      return `<td style="padding:4px;text-align:center;border:1px solid #ebebeb;${bgCell}">
                        ${isAdmin?`<div class="cell-empty-btn" onclick="openPopup('${emp.name.replace(/'/g,"\\'")}',${d})" style="height:32px">+</div>`:'<div style="color:#ddd;text-align:center">—</div>'}
                      </td>`;
                    }
                  }).join('')}
                </tr>`;
              }).join('')}`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </div>`;
}
function getShift(emp,d){return state.schedule[emp+"|"+d]||"";}
function setShift(emp,d,v){state.schedule[emp+"|"+d]=v;}
function shiftInfo(k){return SHIFTS.find(s=>s.key===k)||SHIFTS[SHIFTS.length-1];}

function showToast(msg){
  const t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),2500);
}

function render(){
  const isAdmin=state.mode==="admin";
  if(state.empView&&!isAdmin){
    document.getElementById('app').innerHTML=buildEmpView()+buildReqOverlay()+buildPersonalModal();
    return;
  }
  document.getElementById("app").innerHTML=buildApp();
}

  return `<div class="setup-box">

    <div class="setup-step"><div class="step-num">1</div><div>היכנס ל־<strong>console.firebase.google.com</strong> עם חשבון Google שלך</div></div>

    <div class="setup-step"><div class="step-num">4</div><div>לחץ על גלגל השיניים ← "Project settings" ← גלול למטה ← לחץ "<b>&lt;/&gt;</b>" (Web app) ← הרשם ← העתק את ה-firebaseConfig</div></div>

    <button onclick="applyConfig()">✓ חבר ושמור</button>
    <p style="margin-top:10px;font-size:11px;color:#888;text-align:center">ההגדרות נשמרות רק בדפדפן שלך</p>

}

  const isAdmin=state.mode==="admin";
  const days=getDays();
  return `
<div class="topbar">
  <div style="display:flex;align-items:center;gap:12px">

      <span class="dhl-logo-text">DHL</span>

    ${state.mode!=="admin"?`<button class="sign-btn" onclick="openEmpRequests()" style="background:rgba(255,255,255,0.15);margin-left:6px">📋 בקשות</button>`:""}
    ${state.mode==="admin"?`<button class="bell-btn" onclick="openAdminRequests()" style="margin-left:6px">🔔 בקשות${getPendingCount()>0?` <span class="bell-badge">${getPendingCount()}</span>`:''}</button>`:""}
    ${state.mode==="admin"?`<button class="sign-btn" onclick="openEmpMgr()" style="background:rgba(255,255,255,0.15);margin-left:6px">👥 ניהול עובדים</button>`:""}
    ${state.mode==="admin"?`<button class="sign-btn" onclick="toggleWaNotif()" style="background:${state.waNotif?'rgba(37,211,102,0.35)':'rgba(255,255,255,0.1)'};margin-left:6px">📱 ${state.waNotif?'WA פעיל':'WA כבוי'}</button>`:""}
    ${state.user?`
      <div class="user-pill">

        <span>${state.user.displayName||"מנהל"}</span>

    ${state.showPwdForm&&!state.user?`<div style="position:absolute;top:52px;left:10px;background:#fff;border-radius:10px;padding:12px;box-shadow:0 4px 20px rgba(0,0,0,0.15);z-index:300;display:flex;gap:6px;min-width:240px">
      <input id="admin-pwd-inp" type="password" placeholder="הכנס סיסמת מנהל..." onkeydown="if(event.key==='Enter')doPasswordLogin()" style="flex:1;padding:7px 10px;font-size:13px;border:1px solid #d0d7e8;border-radius:8px;font-family:inherit;direction:rtl">
      <button onclick="doPasswordLogin()" style="padding:7px 12px;background:#D40511;color:#fff;border:none;border-radius:8px;cursor:pointer;font-family:inherit;font-size:13px">כנס</button>
    </div>`:""}
  </div>
</div>
${!isAdmin?`<div style="background:var(--dhl-red);padding:8px 16px;text-align:center">
  <button onclick="openEmpRequests()" style="background:#fff;color:var(--dhl-red);border:none;border-radius:3px;padding:8px 24px;font-size:14px;font-weight:800;cursor:pointer;font-family:inherit">
    📋 הגש בקשה / אילוץ

<div class="dhl-yellow-stripe"></div><div class="month-nav">
  <button onclick="changeMonth(-1)">&#8592;</button>
  <div class="month-label">${MONTHS[state.month]} ${state.year}</div>

  <button onclick="toggleWeekView()" style="margin-right:auto;padding:4px 12px;font-size:12px;font-weight:700;background:${state.weekView?'var(--dhl-red)':'#fff'};color:${state.weekView?'#fff':'var(--dhl-red)'};border:2px solid var(--dhl-red);border-radius:3px;cursor:pointer;font-family:inherit">${state.weekView?'📅 חודשי':'📋 שבועי'}</button>

  <div class="leg"><div class="leg-dot" style="background:#fde8e8;border-radius:2px"></div>שבת</div>
  <span class="sync-tag">🔄 מסונכרן בזמן אמת</span>
  ${!isAdmin?'<span class="view-tag">👁 תצוגה בלבד</span>':""}
</div>
${isAdmin?buildNoteBar(days):""}
${state.weekView?buildWeekView(isAdmin):`<div class="schedule-wrap">${buildTable(days,isAdmin)}</div>`}
${buildSummary(days,isAdmin)}
${state.popup?buildPopup():""}
${state.popup?'<div class="overlay" onclick="closePopup()"></div>':""}
${state.showEmpMgr&&isAdmin?buildEmpMgr():""}${buildReqOverlay()}${buildPersonalModal()}${buildCopyModal()}

function buildNoteBar(days){
  const note=state.notes[state.year+"-"+state.month+"-"+state.noteDay]||"";
  return `<div class="note-bar">
    📝 <span>הערה ליום:</span>
    <select onchange="selectNoteDay(this.value)">
      ${days.map(({d,wd})=>`<option value="${d}" ${d==state.noteDay?"selected":""}>${DAY_NAMES_FULL[wd]} ${d}</option>`).join("")}
    </select>
    <input type="text" id="note-inp" placeholder="חג, אירוע מיוחד, סגור..." value="${note}" oninput="liveNote(this.value)">
    <button onclick="saveNote()">💾 שמור</button>
    <button onclick="fillDefault()" style="background:#FFF3CC;color:#D40511;border-color:#FFCC00;margin-right:8px">⚡ מלא ברירת מחדל</button>
    <button onclick="openCopyMonth()" style="background:#e8f4ea;color:#1e5c2e;border-color:#b0d8b8;margin-right:8px">📋 העתק לחודש הבא</button>
  </div>`;}

function getWeekIndex(d){
  // Returns 0-based week index for a given day number
  const firstWD=ilWD(state.year,state.month,0);
  // day d (1-based), find which week it falls in
  const dayIdx=d-1;
  const adjustedIdx=dayIdx+firstWD;
  return Math.floor(adjustedIdx/7);
}

const WEEK_BG=[

function buildTable(days,isAdmin){
  const roles=[...new Set(employees.map(e=>e.role))];
  let h=`<table class="sched"><thead><tr>
    <th class="emp-col">שם</th><th class="role-col">תפקיד</th>
    ${days.map(({d,wd})=>{
      const isFri=wd===5,isSat=wd===6;
      const bg=isSat?"background:#fde8e8":isFri?"background:#FFF3CC":"";
      const fc=isSat?"color:#a00":isFri?"color:#1a4a8a":"";
      const note=state.notes[state.year+"-"+state.month+"-"+d];
      const wkBg=WEEK_BG[getWeekIndex(d)%WEEK_BG.length];
      const wkStyle=(!isFri&&!isSat)?`background:${wkBg}`:"";
      const finalBg=isSat?"background:#fde8e8":isFri?"background:#FFF3CC":wkStyle;
      return `<th style="${finalBg};${fc}">${DAY_NAMES[wd]}<br><span style="font-weight:400;font-size:10px">${d}</span>${note?`<br><span style="font-size:9px;background:#fff3cd;color:#7a5c00;padding:1px 4px;border-radius:3px;display:inline-block;max-width:70px;overflow:hidden;text-overflow:ellipsis;white-space:normal;word-break:break-word;line-height:1.2" title="${note}">${note}</span>`:""}`;
    }).join("")}
    <th>סה"כ</th>
  </tr></thead><tbody>`;
  roles.forEach(role=>{
    const rc=ROLE_COLORS[role]||"#333";
    h+=`<tr class="role-header"><td colspan="${days.length+3}" style="background:${rc}">${role}</td></tr>`;
    employees.filter(e=>e.role===role).forEach((emp,ei)=>{
      const bg=ei%2===0?"background:#f9fafd":"";
      let tot=0;
      const cells=days.map(({d,wd})=>{
        const isFri=wd===5,isSat=wd===6;
        const k=getShift(emp.name,d);
        const si=shiftInfo(k);
        if(["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(si.key)) tot++;
        const wkColor=WEEK_BG[getWeekIndex(d)%WEEK_BG.length];
        const bgCell=isSat?"background:#fde8e8":isFri?"background:#FFF3CC":`background:${wkColor}`;
        if(k){
          const cn=getCellNote(emp.name,d);
          return `<td style="${bgCell}"><div class="cell-inner ${si.cls}" ${isAdmin?`onclick="openPopup('${emp.name.replace(/'/g,"\\'")}',${d})"`:""} title="${cn?cn:si.label}">${si.label}${cn?`<span style="display:block;font-size:8px;opacity:0.8;overflow:hidden;max-width:34px;white-space:nowrap;text-overflow:ellipsis">${cn}</span>`:""}</div></td>`;
        }
        const cnEmpty=getCellNote(emp.name,d);
        if(cnEmpty){
          return `<td style="${bgCell}"><div class="cell-inner" style="background:#f5f5f5;color:#555;flex-direction:column;height:auto;min-height:26px;padding:2px" ${isAdmin?`onclick="openPopup('${emp.name.replace(/'/g,"\'")}',${d})"`:""}>
            <span style="font-size:8px;color:#aaa">ריק</span>
            <span style="font-size:8px;color:#555;max-width:34px;overflow:hidden;white-space:nowrap;text-overflow:ellipsis" title="${cnEmpty}">${cnEmpty}</span>
          </div></td>`;
        }
        return `<td style="${bgCell}">${isAdmin?`<div class="cell-empty-btn" onclick="openPopup('${emp.name.replace(/'/g,"\\'")}',${d})">+</div>`:'<div style="color:#dde;text-align:center;font-size:12px">—</div>'}</td>`;
      }).join("");
      h+=`<tr style="${bg}"><td class="emp-col">${emp.name}</td><td class="role-badge"><span class="role-pill" style="background:${rc}">${role}</span></td>${cells}<td style="font-weight:700;color:#D40511;font-size:12px">${tot}</td></tr>`;
    });
  });
  return h+`</tbody></table>`;}

function buildSummary(days,isAdmin){
  const weeks=[];let cur=[];
  days.forEach(({d,wd})=>{if(wd===0&&cur.length){weeks.push(cur);cur=[];}cur.push({d,wd});});
  if(cur.length)weeks.push(cur);

  // Filter employees based on mode
  const personalEmp = state.personalEmp;
  const showAll = isAdmin || !personalEmp;
  const filteredEmps = showAll ? employees : employees.filter(e=>e.name===personalEmp);

  const tS=filteredEmps.reduce((a,e)=>a+days.filter(({d})=>["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(getShift(e.name,d))).length,0);
  const tO=filteredEmps.reduce((a,e)=>a+days.filter(({d})=>getShift(e.name,d)==="OFF").length,0);
  const tM=filteredEmps.reduce((a,e)=>a+days.filter(({d})=>getShift(e.name,d)==="MIL").length,0);
  return `<div class="summary-section">
    <h2>סיכום חודשי${!showAll?` — ${personalEmp}`:''}</h2>
    <div class="sum-cards">
      <div class="sum-card" style="grid-column:span 2;text-align:right;background:var(--color-background-primary);border:0.5px solid #d0d7e8">
        <div style="font-size:11px;color:#888;margin-bottom:6px">📢 הודעה לצוות</div>
        ${isAdmin?`
          <div style="display:flex;gap:6px;align-items:center">
            <input id="inline-msg-inp" value="${state.teamMsg||''}" placeholder="כתוב הודעה לכל הצוות..." 
              style="flex:1;padding:6px 10px;font-size:12px;border:0.5px solid #d0d7e8;border-radius:8px;font-family:inherit"
              oninput="state.teamMsg=this.value">
            <button onclick="window.saveTeamMsg()" style="padding:6px 12px;background:#D40511;color:#fff;border:none;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit;white-space:nowrap">שמור</button>
            ${state.teamMsg?`<button onclick="window.clearTeamMsg()" style="padding:6px 10px;background:#fff0f0;color:#c00;border:0.5px solid #ffb0b0;border-radius:8px;font-size:12px;cursor:pointer;font-family:inherit">נקה</button>`:''}
          </div>
        `:`
          <div style="font-size:13px;font-weight:500;color:#D40511;min-height:28px">${state.teamMsg||'<span style="color:#bbb;font-style:italic;font-weight:400">אין הודעות כרגע</span>'}</div>
        `}
      </div>
      <div class="sum-card"><div class="val">${tO}</div><div class="lbl">ימי חופש</div></div>
      <div class="sum-card"><div class="val">${tM}</div><div class="lbl">מילואים</div></div>
    </div>
    <div style="padding:0 16px 16px">
    <table class="emp-sum-table">
      <thead><tr><th>עובד</th><th>תפקיד</th>${weeks.map((_,i)=>`<th>שבוע ${i+1}</th>`).join("")}<th>סה"כ</th><th>חופש</th></tr></thead>
      <tbody>${filteredEmps.map(emp=>{
        const rc=ROLE_COLORS[emp.role]||"#333";
        const wc=weeks.map(w=>w.filter(({d})=>["A","B","C","D","E","F","G","MOTZ","AUDIT","HV","LOW","FLIGHT","REPORT"].includes(getShift(emp.name,d))).length);
        const tot=wc.reduce((a,b)=>a+b,0);
        const off=days.filter(({d})=>getShift(emp.name,d)==="OFF").length;
        const mx=Math.max(...wc,1);
        const hasOverwork=wc.some(v=>v>5);
        return `<tr style="${hasOverwork?'background:#fff5f5':''}">
          <td style="${hasOverwork?'color:#c62828;font-weight:700':''}">${emp.name}${hasOverwork?` <span style="font-size:10px;background:#ffebee;color:#c62828;padding:1px 5px;border-radius:8px;margin-right:4px">⚠️ מעל 5 ימים</span>`:''}</td>
          <td><span class="role-pill" style="background:${rc}">${emp.role}</span></td>
          ${wc.map(v=>`<td style="${v>5?'background:#ffebee;color:#c62828;font-weight:700':''}"><div class="week-bar-wrap"><div class="week-bar" style="background:${v>5?'#c62828':rc};opacity:0.6;width:${Math.round(v/mx*40)}px"></div><span>${v}</span></div></td>`).join("")}
          <td style="font-weight:700;color:#D40511">${tot}</td>
          <td style="color:#5c2e8a">${off}</td>
        </tr>`;
      }).join("")}</tbody>
    </table></div>
  </div>`;}

window.executeCopy=function(){
  const toMonth=parseInt(document.getElementById('copy-to-month').value);
  const toYear=parseInt(document.getElementById('copy-to-year').value);
  if(isNaN(toMonth)||isNaN(toYear)){alert('בחר חודש ושנה');return;}
  if(toMonth===state.month&&toYear===state.year){alert('לא ניתן להעתיק לאותו חודש');return;}
  if(!confirm(`להעתיק את הסידור ל-${MONTHS[toMonth]} ${toYear}? פעולה זו תדרוס סידור קיים!`)) return;
  const newKey=`seder_${toYear}_${toMonth}`;
  const newSched={};
  // Copy schedule adjusting day numbers that exist in target month
  const targetDays=new Date(toYear,toMonth+1,0).getDate();
  Object.entries(state.schedule).forEach(([k,v])=>{
    const [emp,d]=k.split('|');
    if(parseInt(d)<=targetDays) newSched[k]=v;
  });
  set(ref(db,newKey),{schedule:newSched,notes:{},cellNotes:{}});
  showToast(`✓ הסידור הועתק ל-${MONTHS[toMonth]} ${toYear}!`);
  state.showCopy=false;
  render();
};

function listenToRequests(){
  if(!db) return;
  onValue(ref(db,'requests'),(snap)=>{
    const data=snap.val()||{};
    window._allRequests=Object.entries(data).map(([id,v])=>({id,...v}));
    // Check for new responses for current employee
    if(!state.user && reqState.viewEmp){
      const myResponded=window._allRequests.filter(r=>
        r.empName===reqState.viewEmp && r.status!=='pending' && !r.seen
      );
      if(myResponded.length>0){
        showNotifBanner(`יש לך ${myResponded.length} תשובה חדשה לבקשה שלך!`);
      }
    }
    render();
  });
}

function showNotifBanner(msg){
  const b=document.createElement('div');
  b.className='notif-banner';
  b.textContent=msg;
  document.body.appendChild(b);
  setTimeout(()=>b.remove(),4000);
}

window.openEmpView=function(){state.empView=true;state.personalEmp='';state.empViewMode='week';render();};
window.closeEmpView=function(){state.empView=false;state.personalEmp='';render();};
window.setEmpViewMode=function(mode){state.empViewMode=mode;render()};
window.selectEmpAndView=function(name){
  const emp=employees.find(e=>e.name===name);
  const doLogin=function(){
    state.personalEmp=name;
    const weeks=getWeeks();
    const today=new Date();
    let wi=0;
    weeks.forEach((wk,i)=>{ if(wk.some(({d})=>d===today.getDate()&&today.getMonth()===state.month&&today.getFullYear()===state.year)) wi=i; });
    state.weekOffset=wi;
    // If came from "הגש בקשה" — open requests form directly
    if(state._afterLoginGoToRequests){
      state._afterLoginGoToRequests=false;
      state.empView=false;
      reqState={...reqState,show:true,mode:'emp-form',viewEmp:name,viewRole:emp?emp.role:''};
    }
    render();
  };
  if(!emp||!emp.empId){ doLogin(); return; }
  const input=prompt(`שלום ${name} 👋\nהכנס מספר עובד (5 ספרות):`);
  if(input===null){ state._afterLoginGoToRequests=false; return; }
  if(input.trim()===emp.empId){ doLogin(); }
  else { alert('❌ מספר עובד שגוי. נסה שוב.'); }
};

window.submitRequest=function(empName,role){
  const type=document.getElementById('req-type').value;
  const isRange=type==='חופש מספר ימים';
  let date='',dateTo='';
  if(isRange){
    date=document.getElementById('req-date-from').value;
    dateTo=document.getElementById('req-date-to').value;
    if(!date||!dateTo){alert('בחר תאריך התחלה וסיום');return;}
    if(date>dateTo){alert('תאריך ההתחלה חייב להיות לפני תאריך הסיום');return;}
  } else {
    date=document.getElementById('req-date').value;
    if(!date){alert('בחר תאריך');return;}
  }
  const desc=document.getElementById('req-desc').value;
  const id='req_'+Date.now();
  set(ref(db,'requests/'+id),{empName,role,type,date,dateTo:dateTo||'',desc,status:'pending',ts:Date.now(),seen:false});
  showToast('✓ הבקשה נשלחה למנהל!');
  closeReqModal();
};

window.handleRequest=function(id,status){
  const noteEl=document.getElementById('note-'+id);
  const adminNote=noteEl?noteEl.value:'';
  set(ref(db,'requests/'+id+'/status'),status);
  set(ref(db,'requests/'+id+'/adminNote'),adminNote);
  set(ref(db,'requests/'+id+'/seen'),false);
  const req=(window._allRequests||[]).find(r=>r.id===id);
  // Helper: extract day number from YYYY-MM-DD
  function extractDay(dateStr){
    if(!dateStr) return null;
    const p=dateStr.split(/[-\/\.]/);
    if(p.length<2) return null;
    const p0=parseInt(p[0]);
    return p0>31?parseInt(p[2]):parseInt(p[0]);
  }
  if(status==='approved'&&req){
    const isOff=req.type==='חופש'||req.type==='יום חופש'||req.type==='חופשה';
    const isMultiOff=req.type==='חופש מספר ימים';
    const isSabab=req.type==='בקשת סבב';
    if((isOff||isMultiOff||isSabab)&&req.date){
      const shiftKey=isSabab?'SAB':'OFF';
      let daysApplied=0;
      if(isMultiOff&&req.dateTo){
        // Apply shift for each day in range — across any month/year
        const from=new Date(req.date);
        const to=new Date(req.dateTo);
        for(let dt=new Date(from);dt<=to;dt.setDate(dt.getDate()+1)){
          const dayNum=dt.getDate();
          const m=dt.getMonth();
          const y=dt.getFullYear();
          const monthKey=y+'-'+m;
          // Update Firebase for every month in range
          set(ref(db,'schedule/'+monthKey+'/'+req.empName+'|'+dayNum),shiftKey);
          // Also update local state if it's the currently viewed month
          if(m===state.month&&y===state.year){
            setShift(req.empName,dayNum,shiftKey);
          }
          daysApplied++;
        }
        showToast('✅ אושר + '+shiftKey+' עודכן ל-'+daysApplied+' ימים בסידור');
      } else {
        const dayNum=extractDay(req.date);
        if(dayNum&&dayNum>=1&&dayNum<=31){
          setShift(req.empName,dayNum,shiftKey);
          set(ref(db,'schedule/'+state.year+'-'+state.month+'/'+req.empName+'|'+dayNum),shiftKey);
          showToast('✅ אושר + '+(isSabab?'סבב':'חופש')+' עודכן בסידור ליום '+dayNum);
        } else {
          showToast('✅ הבקשה אושרה');
        }
      }
    } else {
      showToast('✅ הבקשה אושרה');
    }
  } else {
    showToast('❌ הבקשה נדחתה');
  }
  if(state.waNotif&&req){
    const phone=getEmpPhone(req.empName);
    if(phone){
      if(confirm(`לשלוח הודעת WhatsApp ל${req.empName} על ${status==='approved'?'אישור':'דחיית'} הבקשה?`)){
        window.sendRequestWhatsApp(req.empName,phone,status,req.type,req.date);
      }
    }
  }
  render();
};

function getEmpPhone(empName){
  const emp=employees.find(e=>e.name===empName);
  return emp&&emp.phone?emp.phone.replace(/\D/g,''):'';
}
function sendWhatsApp(phone,msg){
  if(!phone){showToast('⚠️ אין מספר טלפון לעובד זה');return;}
  // Convert Israeli number to international format
  let intl=phone;
  if(intl.startsWith('0'))intl='972'+intl.slice(1);
  const url='https://wa.me/'+intl+'?text='+encodeURIComponent(msg);
  window.open(url,'_blank');
}
window.sendShiftWhatsApp=function(empName,d,shiftLabel){
  const phone=getEmpPhone(empName);
  const MONTHS_HE=['ינואר','פברואר','מרץ','אפריל','מאי','יוני','יולי','אוגוסט','ספטמבר','אוקטובר','נובמבר','דצמבר'];
  const msg=`היי ${empName} 👋\nהמשמרת שלך בתאריך ${d} ${MONTHS_HE[state.month]} ${state.year} עודכנה ל: ${shiftLabel}.\nבברכה, הנהלה 📋`;
  sendWhatsApp(phone,msg);
};
window.sendRequestWhatsApp=function(empName,phone,status,reqType,reqDate){
  const msg=status==='approved'
    ?`היי ${empName} 👋\nבקשתך "${reqType}"${reqDate?' לתאריך '+reqDate:''} ✅ אושרה!\nבברכה, הנהלה 📋`

  sendWhatsApp(phone,msg);
};
