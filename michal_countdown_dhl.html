<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מיכל וקנין – שעון סיום עבודה</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    min-height: 100vh;
    background: #1a1a1a;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: Arial, sans-serif;
  }
  .card {
    background: #FFCC00;
    border-radius: 24px;
    padding: 2.5rem 2rem 2rem;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1.3rem;
    width: 360px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }
  .dhl-logo {
    font-size: 36px;
    font-weight: 900;
    color: #D40511;
    letter-spacing: 6px;
  }
  .divider {
    width: 100%;
    height: 3px;
    background: #D40511;
    border-radius: 99px;
  }
  .profile-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0.5rem;
  }
  .avatar {
    width: 90px;
    height: 90px;
    border-radius: 50%;
    border: 4px solid #D40511;
    object-fit: cover;
    display: block;
  }
  .name {
    font-size: 22px;
    font-weight: 700;
    color: #1a1a1a;
    text-align: center;
  }
  .date-label {
    font-size: 13px;
    color: #555;
    text-align: center;
  }
  .hourglass-wrap {
    width: 150px;
    height: 220px;
  }
  .blocks {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
  }
  .block {
    display: flex;
    flex-direction: column;
    align-items: center;
    background: #D40511;
    border-radius: 14px;
    padding: 0.9rem 1.1rem;
    min-width: 74px;
  }
  .block-num {
    font-size: 36px;
    font-weight: 700;
    color: #FFCC00;
    line-height: 1;
    font-variant-numeric: tabular-nums;
  }
  .block-label {
    font-size: 11px;
    color: #FFE57A;
    margin-top: 5px;
  }
  .tagline {
    font-size: 11px;
    color: #555;
    letter-spacing: 2px;
    text-transform: uppercase;
  }
  .done-msg {
    font-size: 18px;
    font-weight: 700;
    color: #D40511;
    text-align: center;
    background: #fff;
    border-radius: 12px;
    padding: 1rem 1.5rem;
  }
</style>
</head>

    <div class="name">מיכל וקנין</div>
    <div class="date-label">24/05/2026 &bull; 17:00</div>
  </div>
  <div class="hourglass-wrap">
    <canvas id="hg" width="150" height="220"></canvas>
  </div>
  <div class="blocks" id="blocks">
    <div class="block"><span class="block-num" id="days">--</span><span class="block-label">ימים</span></div>
    <div class="block"><span class="block-num" id="hours">--</span><span class="block-label">שעות</span></div>
    <div class="block"><span class="block-num" id="minutes">--</span><span class="block-label">דקות</span></div>
    <div class="block"><span class="block-num" id="seconds">--</span><span class="block-label">שניות</span></div>
  </div>
  <div class="tagline">Excellence. Simply Delivered.</div>
</div>
<script>
  const target = new Date('2026-05-24T17:00:00');
  const totalMs = target - new Date('2026-05-17T00:00:00');
  const canvas = document.getElementById('hg');
  const ctx = canvas.getContext('2d');
  const W = 150, H = 220, cx = W / 2;

  function drawHourglass(pct) {
    ctx.clearRect(0, 0, W, H);
    const frameColor = '#D40511';
    const sandTop = '#D40511';
    const sandBot = '#FFCC00';
    const emptyColor = '#fff7cc';
    const topY = 20, botY = H - 20;
    const halfW = 54, neckW = 9, neckY = H / 2;

    function topEdgeX(y) {
      const t = (y - topY) / (neckY - topY);
      return cx + (neckW + (halfW - neckW) * (1 - t));
    }
    function botEdgeX(y) {
      const t = (y - neckY) / (botY - neckY);
      return cx + (neckW + (halfW - neckW) * t);
    }

    ctx.save();
    ctx.beginPath();
    ctx.moveTo(cx - halfW, topY);
    for (let y = topY; y <= neckY; y++) ctx.lineTo(topEdgeX(y), y);
    ctx.lineTo(cx + neckW, neckY);
    for (let y = neckY; y <= botY; y++) ctx.lineTo(botEdgeX(y), y);
    ctx.lineTo(cx + halfW, botY);
    ctx.lineTo(cx - halfW, botY);
    for (let y = botY; y >= neckY; y--) ctx.lineTo(cx - (botEdgeX(y) - cx), y);
    ctx.lineTo(cx - neckW, neckY);
    for (let y = neckY; y >= topY; y--) ctx.lineTo(cx - (topEdgeX(y) - cx), y);
    ctx.closePath();
    ctx.fillStyle = emptyColor;
    ctx.fill();
    ctx.restore();

    const topSandH = (neckY - topY) * pct;
    const topSandY = neckY - topSandH;
    if (topSandH > 1) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cx - (topEdgeX(topSandY) - cx), topSandY);
      for (let y = topSandY; y <= neckY; y++) ctx.lineTo(topEdgeX(y), y);
      ctx.lineTo(cx + neckW, neckY);
      for (let y = neckY; y >= topSandY; y--) ctx.lineTo(cx - (topEdgeX(y) - cx), y);
      ctx.closePath();
      ctx.fillStyle = sandTop;
      ctx.fill();
      ctx.restore();
    }

    const elapsed = 1 - pct;
    const botSandH = (botY - neckY) * elapsed;
    const botSandY = botY - botSandH;
    if (botSandH > 1) {
      ctx.save();
      ctx.beginPath();
      ctx.moveTo(cx - neckW, neckY);
      for (let y = neckY; y <= botSandY; y++) ctx.lineTo(botEdgeX(y), y);
      ctx.lineTo(cx + (botEdgeX(botSandY) - cx), botSandY);
      ctx.lineTo(cx - (botEdgeX(botSandY) - cx), botSandY);
      for (let y = botSandY; y >= neckY; y--) ctx.lineTo(cx - (botEdgeX(y) - cx), y);
      ctx.closePath();
      ctx.fillStyle = sandBot;
      ctx.fill();
      ctx.restore();
    }

    ctx.save();
    ctx.strokeStyle = frameColor;
    ctx.lineWidth = 4;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(cx - halfW - 5, topY - 5);
    ctx.lineTo(cx + halfW + 5, topY - 5);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - halfW - 5, botY + 5);
    ctx.lineTo(cx + halfW + 5, botY + 5);
    ctx.stroke();
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(cx - halfW, topY);
    for (let y = topY; y <= neckY; y++) ctx.lineTo(cx - (topEdgeX(y) - cx), y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + halfW, topY);
    for (let y = topY; y <= neckY; y++) ctx.lineTo(topEdgeX(y), y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx - neckW, neckY);
    for (let y = neckY; y <= botY; y++) ctx.lineTo(cx - (botEdgeX(y) - cx), y);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(cx + neckW, neckY);
    for (let y = neckY; y <= botY; y++) ctx.lineTo(botEdgeX(y), y);
    ctx.stroke();
    ctx.restore();
  }

  function pad(n) { return String(n).padStart(2, '0'); }

  function tick() {
    const now = new Date();
    const diff = target - now;
    if (diff <= 0) {
      document.getElementById('blocks').innerHTML = '<div class="done-msg">כל הכבוד מיכל!<br>יום העבודה האחרון הסתיים 🎉</div>';
      drawHourglass(0);
      return;
    }
    document.getElementById('days').textContent    = pad(Math.floor(diff / 86400000));
    document.getElementById('hours').textContent   = pad(Math.floor((diff % 86400000) / 3600000));
    document.getElementById('minutes').textContent = pad(Math.floor((diff % 3600000) / 60000));
    document.getElementById('seconds').textContent = pad(Math.floor((diff % 60000) / 1000));
    drawHourglass(Math.max(0, Math.min(1, diff / totalMs)));
  }

  tick();
  setInterval(tick, 1000);
</script>
